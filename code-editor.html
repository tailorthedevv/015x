        // --- UTILS ---
        const getPath = (itemId, fs) => {
          let path = ''; let currentItem = fs[itemId];
          while (currentItem && currentItem.parentId) { path = `/${currentItem.name}${path}`; currentItem = fs[currentItem.parentId]; }
          return path || '/';
        };

        const getWcTree = (fs, parentId = 'root') => {
            const tree = {};
            Object.values(fs).forEach(item => {
                if (item.parentId === parentId) {
                    if (item.type === ItemType.FOLDER) tree[item.name] = { directory: getWcTree(fs, item.id) };
                    else tree[item.name] = { file: { contents: item.content || '' } };
                }
            });
            return tree;
        };

        const resolveLanguage = (fileName) => {
          const ext = fileName.split('.').pop()?.toLowerCase();
          switch (ext) {
            case 'html': return FileType.HTML;
            case 'css': return FileType.CSS;
            case 'js': case 'jsx': case 'ts': case 'tsx': return FileType.JAVASCRIPT;
            case 'json': return FileType.JSON;
            case 'md': return FileType.MARKDOWN;
            case 'png': return FileType.PNG;
            default: return FileType.UNKNOWN;
          }
        };

        const formatCode = async (code, language) => {
          try {
            let parser = ''; let plugins =[];
            switch (language) {
              case FileType.HTML: parser = 'html'; plugins =[parserHtml, parserPostcss, parserBabel]; break;
              case FileType.CSS: parser = 'css'; plugins = [parserPostcss]; break;
              case FileType.JAVASCRIPT: case FileType.JSON: parser = 'babel'; plugins =[parserBabel, pluginEstree]; break;
              default: return code;
            }
            return await format(code, { parser, plugins, printWidth: 80, tabWidth: 2, semi: true, singleQuote: true });
          } catch (e) { return code; }
        };

        const exportProjectToZip = async (fs) => {
          const zip = new JSZip();
          Object.values(fs).forEach(item => {
            if (item.type === ItemType.FILE && item.content !== undefined) {
              const path = getPath(item.id, fs);
              const zipPath = path.startsWith('/') ? path.slice(1) : path;
              if (item.language === FileType.PNG) zip.file(zipPath, item.content, { base64: true });
              else zip.file(zipPath, item.content);
            }
          });
          const content = await zip.generateAsync({ type: 'blob' });
          const url = window.URL.createObjectURL(content);
          const a = document.createElement('a'); a.href = url; a.download = 'project.zip'; a.click();
          window.URL.revokeObjectURL(url);
        };

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="space-y-4">
                                <h3 className="text-xs font-bold uppercase text-neutral-500 mb-2">General</h3>
                                <div className="flex items-center justify-between"><span className="text-sm text-neutral-300">Save File</span><span className="px-2 py-1 bg-vs-activityBar border border-vs-border rounded text-xs font-mono text-neutral-400">Ctrl S</span></div>
                                <div className="flex items-center justify-between"><span className="text-sm text-neutral-300">Toggle Sidebar</span><span className="px-2 py-1 bg-vs-activityBar border border-vs-border rounded text-xs font-mono text-neutral-400">Ctrl B</span></div>
                            </div>
                        </div>
                    )}
                    {activeTab === 'about' && (
                        <div className="space-y-6 text-neutral-300 text-center">
                            <h1 className="text-xl font-bold text-white mb-2">015x.dev OS</h1>
                            <p className="text-sm text-neutral-400 bg-vs-activityBar p-4 rounded border border-vs-border">A powerful WebAssembly powered IDE.</p>
                        </div>
                    )}
                </div>
              </div>
            </div>
          );
        };

        const LessonModal = ({ isOpen, onClose, onTryCode, lessons }) => {
            const [activeLesson, setActiveLesson] = useState(null);
            if (!isOpen) return null;
            if (!activeLesson) {
                return (
                    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm animate-fade-in p-4" onClick={onClose}>
                        <div className="bg-vs-bg border border-vs-border w-full max-w-5xl rounded-lg shadow-2xl flex flex-col overflow-hidden animate-slide-in" onClick={e => e.stopPropagation()}>
                            <div className="bg-vs-activityBar border-b border-vs-border px-6 py-6 flex items-center justify-between">
                                <div><h2 className="text-2xl font-bold text-vs-text"><GraduationCap className="inline mr-3 text-vs-accent" size={28} />Learning Library</h2></div>
                                <button onClick={onClose} className="p-2 hover:bg-vs-itemHover rounded-full text-neutral-400 hover:text-vs-text"><X size={24} /></button>
                            </div>
                            <div className="p-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 bg-vs-bg">
                                {lessons.map(l => (
                                    <div key={l.id} onClick={() => setActiveLesson(l)} className="bg-vs-sidebar border border-vs-border rounded-lg p-5 cursor-pointer hover:border-vs-accent transition-all flex flex-col">
                                        <h3 className="text-lg font-bold text-vs-text mb-2">{l.title}</h3>
                                        <p className="text-sm text-neutral-400 mb-6">{l.description}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm animate-fade-in p-4" onClick={onClose}>
                    <div className="bg-vs-bg border border-vs-border w-full max-w-4xl rounded-lg shadow-2xl flex flex-col overflow-hidden animate-slide-in" onClick={e => e.stopPropagation()}>
                        <div className="bg-vs-activityBar border-b border-vs-border px-6 py-4 flex items-center justify-between">
                            <h2 className="text-lg font-bold text-vs-text">{activeLesson.title}</h2>
                            <button onClick={() => setActiveLesson(null)} className="p-1 text-neutral-400 hover:text-white"><ArrowLeft size={20} /></button>
                        </div>
                        <div className="p-8 overflow-y-auto bg-vs-bg">
                            <h3 className="text-xl font-bold text-vs-text mb-4">{activeLesson.sections[0].title}</h3>
                            <pre className="bg-vs-inputBg p-4 rounded text-sm text-vs-text overflow-x-auto"><code>{activeLesson.sections[0].code_snippet}</code></pre>
                            <button onClick={() => onTryCode(activeLesson.sections[0].code_snippet)} className="mt-4 bg-vs-accent text-white px-4 py-2 rounded">Try Code</button>
                        </div>
                    </div>
                </div>
            );
        };

        const CodeEditor = ({ file, settings, theme, ghostText, onChange, onFormat, onSave }) => {
          const editorRef = React.useRef(null);
          const monacoRef = React.useRef(null);
          const [contentLeft, setContentLeft] = useState(62);

          const handleEditorDidMount = (editor, monaco) => {
            editorRef.current = editor; monacoRef.current = monaco;
            monaco.editor.defineTheme(theme.id, { base: theme.monaco.base, inherit: theme.monaco.inherit, rules: theme.monaco.rules, colors: theme.monaco.colors });
            monaco.editor.setTheme(theme.id);
            editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyMod.Shift | monaco.KeyCode.KeyF, () => { if (onFormat) onFormat(); });
            editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, () => { if (onSave) onSave(); });
            editor.onDidLayoutChange((e) => setContentLeft(e.contentLeft));
            setContentLeft(editor.getLayoutInfo().contentLeft);
          };

          useEffect(() => {
              if (monacoRef.current && theme) {
                  monacoRef.current.editor.defineTheme(theme.id, { base: theme.monaco.base, inherit: theme.monaco.inherit, rules: theme.monaco.rules, colors: theme.monaco.colors });
                  monacoRef.current.editor.setTheme(theme.id);
              }
          },[theme]);

          useEffect(() => { if (editorRef.current) editorRef.current.layout(); }, [settings.fontSize, settings.minimap, settings.wordWrap]);

          if (!file) return (
             <div className="h-full w-full bg-vs-bg flex flex-col items-center justify-center text-vs-text select-none relative overflow-hidden">
                <div className="absolute opacity-[0.02] pointer-events-none transform -rotate-12 scale-150"><LayoutTemplate size={400} /></div>
                <div className="z-10 flex flex-col items-center max-w-md w-full px-6"><Lightbulb size={32} className="text-vs-accent mb-4" /><h2 className="text-2xl font-bold tracking-tight text-vs-text">Ready to create?</h2></div>
              </div>
          );

          return (
            <div className="h-full w-full bg-vs-bg relative group overflow-hidden">
              <Editor
                height="100%" language={file.language || 'plaintext'} value={file.content || ''}
                onChange={(value) => onChange(value || '')} onMount={handleEditorDidMount}
                options={{
                  minimap: { enabled: settings.minimap, scale: 0.75 }, fontSize: settings.fontSize, lineHeight: 21,
                  fontFamily: "'Fira Code', 'Consolas', 'Monaco', 'Courier New', monospace", fontLigatures: settings.fontLigatures,
                  wordWrap: settings.wordWrap, tabSize: settings.tabSize, lineNumbers: settings.lineNumbers,
                  cursorStyle: settings.cursorStyle, cursorBlinking: settings.cursorBlinking, smoothScrolling: settings.smoothScrolling,
                  cursorSmoothCaretAnimation: settings.cursorSmoothCaretAnimation, padding: { top: 16 }, formatOnPaste: true, formatOnType: true,
                }}
              />
            </div>
          );
        };

        const Preview = ({ previewUrl, refreshTrigger }) => {
          const iframeRef = useRef(null);
          useEffect(() => { if (iframeRef.current && previewUrl) iframeRef.current.src = iframeRef.current.src; }, [refreshTrigger, previewUrl]);
          return (
            <div className="h-full w-full flex flex-col bg-white relative group">
              {!previewUrl ? (
                  <div className="absolute inset-0 flex flex-col items-center justify-center text-neutral-400 bg-vs-bg">
                      <Loader2 className="w-8 h-8 animate-spin mb-4 text-vs-accent" />
                      <p className="text-sm font-medium text-vs-text">Awaiting Server Start...</p>
                  </div>
              ) : <iframe ref={iframeRef} src={previewUrl} title="preview" className="flex-1 w-full h-full border-none bg-white" allow="cross-origin-isolated" />}
            </div>
          );
        };

        function useDebounce(value, delay) {
          const[debouncedValue, setDebouncedValue] = useState(value);
          useEffect(() => { const handler = setTimeout(() => setDebouncedValue(value), delay); return () => clearTimeout(handler); }, [value, delay]);
          return debouncedValue;
        }

        const App = () => {
          const [wc, setWc] = useState(null);
          const [isBooting, setIsBooting] = useState(true);
          const [serverReady, setServerReady] = useState(false);
          const [previewUrl, setPreviewUrl] = useState('');
          const terminalRef = useRef(null);

          const [fileSystem, setFileSystem] = useState(INITIAL_FILE_SYSTEM);
          const [activeFileId, setActiveFileId] = useState('index.js');
          const [openFiles, setOpenFiles] = useState(['package.json', 'index.js']);
          const [sidebarWidth, setSidebarWidth] = useState(240);
          const [editorWidth, setEditorWidth] = useState(600);
          const [activeSidebarView, setActiveSidebarView] = useState('explorer');
          const [refreshTrigger, setRefreshTrigger] = useState(0);
          const [activeMenu, setActiveMenu] = useState(null);
          const [isHelpModalOpen, setIsHelpModalOpen] = useState(false);
          const [isLessonModalOpen, setIsLessonModalOpen] = useState(false);
          
          const [isResizing, setIsResizing] = useState(false);
          const [settings, setSettings] = useState(DEFAULT_SETTINGS);
          const [currentThemeId, setCurrentThemeId] = useState('vs-dark');
          const styleRef = useRef(null);
          const writeTimer = useRef(null);

          const updateSettings = (newSettings) => setSettings(prev => ({ ...prev, ...newSettings }));

          useEffect(() => {
                if (!window.crossOriginIsolated) return;
                let mounted = true;
                async function bootOS() {
                    try {
                        if (!window.__wcPromise) window.__wcPromise = WebContainer.boot();
                        const container = await window.__wcPromise;
                        if (!mounted) return;
                        setWc(container);
                        await container.mount(getWcTree(fileSystem));
                        container.on('server-ready', (port, url) => { setPreviewUrl(url); setServerReady(true); });
                        setIsBooting(false);
                        startShell(container);
                    } catch (error) { console.error("OS Boot Error:", error); }
                }
                bootOS();
                return () => { mounted = false; };
          }, []);

          const startShell = async (container) => {
                if (!terminalRef.current || window.__shellStarted) return;
                window.__shellStarted = true;
                const term = new Terminal({ convertEol: true, theme: { background: '#1e1e1e', foreground: '#cccccc' }, fontFamily: '"Fira Code", Consolas, monospace', fontSize: 13 });
                const fitAddon = new FitAddon();
                term.loadAddon(fitAddon); term.open(terminalRef.current);
                const resizeObserver = new ResizeObserver(() => fitAddon.fit());
                resizeObserver.observe(terminalRef.current);
                setTimeout(() => fitAddon.fit(), 100);
                term.writeln('\x1b[1;34m[SYSTEM]\x1b[0m \x1b[1mWebAssembly Engine Initialized.\x1b[0m');
                const shellProcess = await container.spawn('jsh', { terminal: { cols: term.cols, rows: term.rows } });
                shellProcess.output.pipeTo(new WritableStream({ write(data) { term.write(data); } }));
                const input = shellProcess.input.getWriter();
                term.onData((data) => input.write(data));
                await input.write('npm install && npm start\r');
          };

          const currentTheme = useMemo(() => THEMES.find(t => t.id === currentThemeId) || THEMES[0], [currentThemeId]);

          useEffect(() => {
            const root = document.documentElement;
            const colors = currentTheme.colors;
            if (!colors) return;
            root.style.setProperty('--vs-bg', colors.bg); root.style.setProperty('--vs-sidebar', colors.sidebar);
            root.style.setProperty('--vs-activity-bar', colors.activityBar); root.style.setProperty('--vs-active-tab', colors.activeTab);
            root.style.setProperty('--vs-inactive-tab', colors.inactiveTab); root.style.setProperty('--vs-border', colors.border);
            root.style.setProperty('--vs-accent', colors.accent); root.style.setProperty('--vs-text', colors.text);
            root.style.setProperty('--vs-text-hover', colors.textHover); root.style.setProperty('--vs-item-hover', colors.itemHover);
            root.style.setProperty('--vs-item-active', colors.itemActive); root.style.setProperty('--vs-input-bg', colors.inputBg || colors.activityBar); 
            if (!styleRef.current) { styleRef.current = document.createElement('style'); document.head.appendChild(styleRef.current); }
            styleRef.current.innerHTML = currentTheme.customCss || '';
          }, [currentTheme]);

          const startSidebarResizing = useCallback((e) => {
            e.preventDefault(); e.stopPropagation(); setIsResizing(true);
            const handleMouseMove = (e) => setSidebarWidth(Math.max(180, Math.min(600, e.clientX - 48))); 
            const handleMouseUp = () => { setIsResizing(false); document.removeEventListener('mousemove', handleMouseMove); document.removeEventListener('mouseup', handleMouseUp); };
            document.addEventListener('mousemove', handleMouseMove); document.addEventListener('mouseup', handleMouseUp);
          },[]);

          const startEditorResizing = useCallback((e) => {
            e.preventDefault(); e.stopPropagation(); setIsResizing(true);
            const handleMouseMove = (e) => setEditorWidth(Math.max(200, e.clientX - (activeSidebarView === 'hidden' ? 48 : sidebarWidth + 48)));
            const handleMouseUp = () => { setIsResizing(false); document.removeEventListener('mousemove', handleMouseMove); document.removeEventListener('mouseup', handleMouseUp); window.dispatchEvent(new Event('resize')); };
            document.addEventListener('mousemove', handleMouseMove); document.addEventListener('mouseup', handleMouseUp);
          },[activeSidebarView, sidebarWidth]);

          const handleSelectFile = (id) => { if (!openFiles.includes(id)) setOpenFiles(prev => [...prev, id]); setActiveFileId(id); };

          const handleCloseFile = (e, id) => {
              e.stopPropagation();
              setOpenFiles(prev => {
                  const newOpenFiles = prev.filter(fid => fid !== id);
                  if (activeFileId === id) setActiveFileId(newOpenFiles.length > 0 ? newOpenFiles[newOpenFiles.length - 1] : null);
                  return newOpenFiles;
              });
          };

          const updateFileContent = (id, content) => {
            setFileSystem(prev => {
                const next = { ...prev, [id]: { ...prev[id], content } };
                if (wc) {
                    const path = getPath(id, next);
                    clearTimeout(writeTimer.current);
                    writeTimer.current = setTimeout(async () => {
                        try { await wc.fs.writeFile(path, content); } catch(err) { console.error(err); }
                    }, 400); 
                }
                return next;
            });
          };

          const handleTryCode = (code) => {
              setIsLessonModalOpen(false);
              const timestamp = Date.now();
              const id = `file_${timestamp}`;
              const name = `lesson-${timestamp.toString().slice(-4)}.js`;
              setFileSystem(prev => {
                  const next = { ...prev, [id]: { id, name, parentId: 'root', type: ItemType.FILE, language: FileType.JAVASCRIPT, content: code } };
                  if (wc) wc.fs.writeFile(`/${name}`, code).catch(console.error);
                  return next;
              });
              setTimeout(() => { setOpenFiles(prev => [...prev, id]); setActiveFileId(id); }, 0);
          };

          const toggleFolder = (id) => setFileSystem(prev => ({ ...prev, [id]: { ...prev[id], isOpen: !prev[id].isOpen } }));

          const createItem = useCallback((type, parentId) => {
              const name = prompt(`Enter ${type} name:`);
              if (!name) return;
              const id = `${type}_${Date.now()}`;
              setFileSystem(prev => {
                  let language = FileType.UNKNOWN;
                  if (type === ItemType.FILE) {
                      const ext = name.split('.').pop()?.toLowerCase();
                      if (ext === 'html') language = FileType.HTML; else if (ext === 'css') language = FileType.CSS; else if (ext === 'js' || ext === 'ts') language = FileType.JAVASCRIPT; else if (ext === 'json') language = FileType.JSON;
                  }
                  const newItem = { id, name, parentId, type, content: type === ItemType.FILE ? '' : undefined, language, isOpen: type === ItemType.FOLDER ? true : undefined };
                  const newFS = { ...prev, [id]: newItem };
                  if (wc) {
                      const path = getPath(id, newFS);
                      if (type === ItemType.FOLDER) wc.fs.mkdir(path).catch(console.error); else wc.fs.writeFile(path, '').catch(console.error);
                  }
                  return newFS;
              });
              if (type === ItemType.FILE) setTimeout(() => { setOpenFiles(prev => prev.includes(id) ? prev :[...prev, id]); setActiveFileId(id); }, 0);
          },[wc]);

          const deleteItem = useCallback((id) => {
              if (!window.confirm('Are you sure you want to delete this?')) return;
              let pathToDelete = '';
              setFileSystem(prev => {
                  pathToDelete = getPath(id, prev);
                  const newFS = { ...prev }; delete newFS[id]; return newFS;
              });
              if (wc && pathToDelete) wc.fs.rm(pathToDelete, { recursive: true }).catch(console.error);
              setOpenFiles(prev => prev.filter(fid => fid !== id));
              if (activeFileId === id) setActiveFileId(null);
          },[fileSystem, activeFileId, wc]);

          const activeFile = activeFileId && fileSystem[activeFileId] ? fileSystem[activeFileId] : null;

          if (!window.crossOriginIsolated) {
                return (
                    <div className="h-full w-full flex flex-col items-center justify-center bg-[#1e1e1e] text-[#cccccc]">
                        <Loader2 className="w-12 h-12 animate-spin text-[#007acc] mb-6" />
                        <h2 className="text-3xl font-bold tracking-tight">Initializing MACRO OS</h2>
                        <p className="text-[#888888] mt-2">Bypassing CDN blocks and booting sandbox...</p>
                    </div>
                );
          }

          return (
            <div className="flex flex-col h-screen bg-vs-bg text-vs-text overflow-hidden font-sans transition-colors duration-300">
                {isResizing && <div className="fixed inset-0 z-50 cursor-col-resize bg-transparent"></div>}
                
                <HelpModal isOpen={isHelpModalOpen} onClose={() => setIsHelpModalOpen(false)} />
                <LessonModal isOpen={isLessonModalOpen} onClose={() => setIsLessonModalOpen(false)} onTryCode={handleTryCode} lessons={LESSONS} />

                {/* Header */}
                <div className="h-10 bg-vs-activityBar flex items-center justify-between px-4 border-b border-vs-border z-30 shrink-0">
                    <div className="flex items-center space-x-4">
                        <div className="font-bold text-vs-accent flex items-center mr-4">
                            <LayoutTemplate size={18} className="mr-2" />
                            015x.dev OS
                        </div>
                    </div>
                    <div className="flex items-center space-x-3">
                        <div className="flex items-center text-xs font-bold uppercase tracking-widest mr-4">
                            {isBooting ? <span className="text-yellow-500 flex items-center"><Loader2 className="w-3 h-3 mr-2 animate-spin"/> Booting OS...</span> 
                            : serverReady ? <span className="text-green-500 flex items-center"><div className="w-2 h-2 bg-green-500 rounded-full animate-pulse mr-2"></div> Node.js Active</span> 
                            : <span className="text-blue-400 flex items-center"><Loader2 className="w-3 h-3 mr-2 animate-spin"/> Starting Server...</span>}
                        </div>
                        <button onClick={() => setIsLessonModalOpen(true)} className="flex items-center space-x-1 px-3 py-1 bg-purple-600 hover:bg-purple-500 text-white text-xs rounded transition-colors shadow-sm">
                            <GraduationCap size={14} fill="currentColor" /><span>Learn</span>
                        </button>
                    </div>
                </div>

                <div className="flex-1 flex overflow-hidden">
                    {/* Activity Bar */}
                    <div className="w-12 bg-vs-activityBar flex flex-col items-center py-4 space-y-4 shrink-0 border-r border-vs-border z-20">
                        <div className={`p-2 rounded cursor-pointer relative ${activeSidebarView === 'explorer' ? 'text-vs-text' : 'text-neutral-500'}`} onClick={() => setActiveSidebarView(activeSidebarView === 'explorer' ? 'hidden' : 'explorer')} title="Explorer">
                            <FileCode2 size={24} strokeWidth={1.5} color={activeSidebarView === 'explorer' ? 'var(--vs-accent)' : 'currentColor'} />
                            {activeSidebarView === 'explorer' && <div className="absolute left-0 top-0 bottom-0 w-0.5 bg-vs-accent"></div>}
                        </div>
                        <div className={`p-2 rounded cursor-pointer relative ${activeSidebarView === 'search' ? 'text-vs-text' : 'text-neutral-500'}`} onClick={() => setActiveSidebarView(activeSidebarView === 'search' ? 'hidden' : 'search')} title="Search">
                            <Search size={24} strokeWidth={1.5} color={activeSidebarView === 'search' ? 'var(--vs-accent)' : 'currentColor'} />
                            {activeSidebarView === 'search' && <div className="absolute left-0 top-0 bottom-0 w-0.5 bg-vs-accent"></div>}
                        </div>
                        <div className={`p-2 rounded cursor-pointer relative ${activeSidebarView === 'source-control' ? 'text-vs-text' : 'text-neutral-500'}`} onClick={() => setActiveSidebarView(activeSidebarView === 'source-control' ? 'hidden' : 'source-control')} title="Source Control">
                            <GitBranch size={24} strokeWidth={1.5} color={activeSidebarView === 'source-control' ? 'var(--vs-accent)' : 'currentColor'} />
                            {activeSidebarView === 'source-control' && <div className="absolute left-0 top-0 bottom-0 w-0.5 bg-vs-accent"></div>}
                        </div>
                        <div className={`p-2 rounded cursor-pointer relative ${activeSidebarView === 'snippets' ? 'text-vs-text' : 'text-neutral-500'}`} onClick={() => setActiveSidebarView(activeSidebarView === 'snippets' ? 'hidden' : 'snippets')} title="Snippets">
                            <Blocks size={24} strokeWidth={1.5} color={activeSidebarView === 'snippets' ? 'var(--vs-accent)' : 'currentColor'} />
                            {activeSidebarView === 'snippets' && <div className="absolute left-0 top-0 bottom-0 w-0.5 bg-vs-accent"></div>}
                        </div>
                        <div className={`mt-auto p-2 rounded cursor-pointer relative ${activeSidebarView === 'settings' ? 'text-vs-text' : 'text-neutral-500'}`} onClick={() => setActiveSidebarView(activeSidebarView === 'settings' ? 'hidden' : 'settings')} title="Settings">
                            <Settings size={24} strokeWidth={1.5} color={activeSidebarView === 'settings' ? 'var(--vs-accent)' : 'currentColor'} />
                            {activeSidebarView === 'settings' && <div className="absolute left-0 top-0 bottom-0 w-0.5 bg-vs-accent"></div>}
                        </div>
                    </div>

                    {/* Sidebar Pane */}
                    {activeSidebarView !== 'hidden' && (
                        <div style={{ width: sidebarWidth }} className="flex flex-col shrink-0 relative border-r border-vs-border bg-vs-sidebar overflow-hidden">
                            {activeSidebarView === 'explorer' && <Explorer fileSystem={fileSystem} activeFileId={activeFileId} onSelectFile={handleSelectFile} onToggleFolder={toggleFolder} onCreateItem={createItem} onDeleteItem={deleteItem} onRenameItem={()=>{}} onMoveItem={()=>{}} />}
                            {activeSidebarView === 'search' && <SearchPane fileSystem={fileSystem} onSelectFile={handleSelectFile} />}
                            {activeSidebarView === 'source-control' && <SourceControlPane fileSystem={fileSystem} initialFileSystem={INITIAL_FILE_SYSTEM} onSelectFile={handleSelectFile} />}
                            {activeSidebarView === 'snippets' && <SnippetsPane />}
                            {activeSidebarView === 'settings' && <SettingsPane settings={settings} currentThemeId={currentThemeId} onUpdateSettings={updateSettings} onUpdateTheme={setCurrentThemeId} />}
                            <div className="absolute top-0 right-0 w-2 h-full cursor-col-resize hover:bg-vs-accent transition-colors z-20 opacity-0 hover:opacity-100" onMouseDown={startSidebarResizing} />
                        </div>
                    )}

                    {/* Main Editor + Terminal + Preview Area */}
                    <div className="flex-1 flex flex-col min-w-0 bg-vs-bg">
                        {/* Tabs */}
                        <div className="flex h-9 bg-vs-activityBar border-b border-vs-border shrink-0">
                            <div style={{ width: editorWidth }} className="h-full flex overflow-x-auto custom-scrollbar border-r border-vs-border shrink-0 bg-vs-inactive-tab">
                                {openFiles.map(id => {
                                    const file = fileSystem[id];
                                    if (!file) return null;
                                    const isActive = activeFileId === id;
                                    return (
                                        <div key={id} className={`group flex items-center px-3 text-xs border-r border-vs-border cursor-pointer min-w-[120px] max-w-[200px] select-none h-full ${isActive ? 'bg-vs-bg text-vs-text border-t-2 border-t-vs-accent' : 'bg-transparent text-neutral-500 hover:bg-vs-itemHover'}`} onClick={() => setActiveFileId(id)}>
                                            <span className={`mr-2 ${isActive ? 'text-vs-accent' : ''}`}>{file.language === 'html' ? '<>' : '#'}</span>
                                            <span className="truncate flex-1">{file.name}</span>
                                            <button className={`ml-2 p-0.5 rounded-sm hover:bg-neutral-600 ${isActive ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'}`} onClick={(e) => handleCloseFile(e, id)}><X size={12} /></button>
                                        </div>
                                    );
                                })}
                            </div>
                            
                            {/* Browser Bar */}
                            <div className="flex-1 h-full flex items-center px-2 space-x-2 min-w-0 bg-vs-bg select-none border-b border-vs-border">
                                <button onClick={() => setRefreshTrigger(t => t + 1)} title="Reload Frame" className="p-1.5 rounded-sm hover:bg-vs-itemHover text-vs-text opacity-70 hover:opacity-100 transition-colors shrink-0">
                                    <RefreshCw size={14} />
                                </button>
                                <div className="flex-1 flex items-center relative group min-w-0 mt-1 mb-1">
                                    <div className="absolute left-2 top-1/2 -translate-y-1/2 text-vs-text opacity-50 pointer-events-none z-10"><Globe size={12} /></div>
                                    <input type="text" readOnly value={previewUrl || 'Waiting for localhost...'} className="w-full pl-7 pr-7 text-[11px] bg-vs-input-bg border border-vs-border rounded-sm text-vs-text font-mono shadow-sm h-6" />
                                </div>
                            </div>
                        </div>

                        {/* Middle Content Split */}
                        <div className="flex-1 flex overflow-hidden">
                            {/* Editor & Terminal Column */}
                            <div style={{ width: editorWidth }} className="h-full relative border-r border-vs-border flex flex-col">
                                
                                {/* Monaco Editor */}
                                <div className="flex-1 relative min-h-0">
                                    <CodeEditor file={activeFile} settings={settings} theme={currentTheme} onChange={(val) => activeFileId && updateFileContent(activeFileId, val)} />
                                </div>

                                {/* Terminal */}
                                <div className="h-64 shrink-0 bg-vs-sidebar border-t border-vs-border flex flex-col shadow-[0_-5px_15px_rgba(0,0,0,0.3)] z-10">
                                    <div className="h-8 shrink-0 bg-vs-activityBar flex items-center px-4 text-[10px] font-bold tracking-widest uppercase text-neutral-400 border-b border-vs-border shadow-sm">
                                        <TerminalIcon className="w-3.5 h-3.5 mr-2" /> Xterm Console
                                    </div>
                                    <div className="flex-1 relative p-2 bg-[#1e1e1e]">
                                        <div className="absolute inset-0 p-2 overflow-hidden" ref={terminalRef}></div>
                                    </div>
                                </div>

                            </div>
                            
                            <div className="w-2 -ml-1 h-full cursor-col-resize hover:bg-vs-accent transition-colors z-30 bg-transparent hover:opacity-100" onMouseDown={startEditorResizing} />

                            {/* Live Preview Column */}
                            <div className={`flex-1 h-full bg-white relative min-w-0`}>
                                <Preview previewUrl={previewUrl} refreshTrigger={refreshTrigger} />
                            </div>
                        </div>
                    </div>
                </div>
                
                {/* Footer */}
                <div className="h-6 bg-vs-accent text-white text-[10px] flex items-center px-4 justify-between select-none shrink-0 transition-colors duration-300">
                     <div className="flex items-center space-x-3">
                         <span className="flex items-center"><div className="w-2 h-2 rounded-full bg-white mr-1 animate-pulse"></div> Local Server OS Linked</span>
                         {activeFile && (<><span className="uppercase">{activeFile.language}</span><span>UTF-8</span></>)}
                     </div>
                     <div className="flex items-center space-x-4">
                         <span>{settings.tabSize} Spaces</span>
                         <span>015x.dev OS</span>
                     </div>
                </div>
            </div>
          );
        };

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<React.StrictMode><App /></React.StrictMode>);
    </script>
</body>
</html>
