<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>015x Serverless IDE</title>
    
    <link rel="icon" href="data:,">

    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "@monaco-editor/react": "https://esm.sh/@monaco-editor/react@4.6.0?deps=react@18.2.0,react-dom@18.2.0",
        "lucide-react": "https://esm.sh/lucide-react@0.330.0?deps=react@18.2.0",
        "@webcontainer/api": "https://esm.sh/@webcontainer/api",
        "xterm": "https://esm.sh/xterm@5.3.0",
        "xterm-addon-fit": "https://esm.sh/xterm-addon-fit@0.8.0"
      }
    }
    </script>

    <script>
        if (typeof window !== 'undefined' && window.crossOriginIsolated === false) {
            navigator.serviceWorker.register('./sw.js').then(reg => {
                reg.update();
                if (reg.active && !navigator.serviceWorker.controller) window.location.reload();
            });
            navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload());
        }
    </script>

    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0d1117; color: #c9d1d9; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #484f58; }
        .xterm-viewport { overflow-y: auto !important; }
        /* Prevent text selection during resize */
        .resizing { user-select: none; }
    </style>
</head>
<body>
    <div id="root" class="h-screen w-screen overflow-hidden flex flex-col"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import Editor, { useMonaco } from '@monaco-editor/react';
        import { WebContainer } from '@webcontainer/api';
        import { Terminal } from 'xterm';
        import { FitAddon } from 'xterm-addon-fit';
        import { RotateCcw, Terminal as TerminalIcon, Globe, FileCode2, Loader2, Cpu, Upload, Files, Search, Settings } from 'lucide-react';

        // Express + Node.js Demo Files
        // Notice the escaped <\/script> to prevent breaking the outer babel script block
        const INITIAL_FILES = {
            'package.json': {
                file: {
                    contents: JSON.stringify({
                        name: "browser-os-express",
                        scripts: { start: "node server.js" },
                        dependencies: { express: "^4.18.2" }
                    }, null, 2)
                }
            },
            'server.js': {
                file: {
                    contents: `const express = require('express');\nconst app = express();\nconst port = 3111;\n\n// Serve static files from the root\napp.use(express.static('./'));\n\n// API Route\napp.get('/api/data', (req, res) => {\n  res.json({ message: 'Hello from Node.js (Express) inside your browser!' });\n});\n\napp.listen(port, () => {\n  console.log(\`Server is running on http://localhost:\${port}\`);\n});`
                }
            },
            'index.html': {
                file: {
                    contents: `<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <link rel="stylesheet" href="style.css">\n</head>\n<body>\n  <div class="container">\n    <h1>🚀 Express WebContainer Demo</h1>\n    <p id="api-response" class="api-text">Loading API data...</p>\n  </div>\n  <script>\n    fetch('/api/data')\n      .then(res => res.json())\n      .then(data => {\n        document.getElementById('api-response').innerText = data.message;\n      })\n      .catch(err => {\n        document.getElementById('api-response').innerText = 'Error loading API';\n      });\n  <\\/script>\n</body>\n</html>`.replace(/<\\\/script>/g, '</' + 'script>') 
                    // We use replace here so it stays completely safe from HTML parsers while outputting the raw script!
                }
            },
            'style.css': {
                file: {
                    contents: `body { background: #0d1117; color: #58a6ff; font-family: system-ui; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }\n.container { text-align: center; background: #161b22; padding: 40px; border-radius: 12px; border: 1px solid #30363d; }\n.api-text { color: #3fb950; font-weight: bold; margin-top: 20px; font-size: 1.1em; }`
                }
            }
        };

        const App = () => {
            const [wc, setWc] = useState(null);
            const [isBooting, setIsBooting] = useState(true);
            const [serverReady, setServerReady] = useState(false);
            const [files, setFiles] = useState(INITIAL_FILES);
            const [activeFile, setActiveFile] = useState('server.js');
            const [previewUrl, setPreviewUrl] = useState('');
            const [addressBarUrl, setAddressBarUrl] = useState('');
            const [isDeploying, setIsDeploying] = useState(false);
            
            // UI State
            const [sidebarTab, setSidebarTab] = useState('files');
            const [searchQuery, setSearchQuery] = useState('');
            const [editorConfig, setEditorConfig] = useState({
                theme: 'vs-dark',
                wordWrap: 'on',
                cursorStyle: 'line',
                cursorBlinking: 'blink',
                fontSize: 14
            });

            // Resizing State
            const [sidebarWidth, setSidebarWidth] = useState(250);
            const [previewWidth, setPreviewWidth] = useState(450);
            const [terminalHeight, setTerminalHeight] = useState(280);

            const terminalRef = useRef(null);
            const writeTimer = useRef(null);
            const monaco = useMonaco();

            // Register Custom Monaco Themes
            useEffect(() => {
                if (monaco) {
                    monaco.editor.defineTheme('monokai', {
                        base: 'vs-dark',
                        inherit: true,
                        rules: [
                            { token: 'comment', foreground: '75715e' },
                            { token: 'keyword', foreground: 'f92672' },
                            { token: 'string', foreground: 'e6db74' },
                            { token: 'number', foreground: 'ae81ff' },
                            { token: 'identifier', foreground: 'f8f8f2' },
                            { token: 'type', foreground: '66d9ef' },
                            { token: 'function', foreground: 'a6e22e' }
                        ],
                        colors: {
                            'editor.background': '#272822',
                            'editor.foreground': '#f8f8f2',
                            'editorLineNumber.foreground': '#90908a',
                        }
                    });
                }
            }, [monaco]);

            // Synchronize preview URL to the address bar when loaded
            useEffect(() => {
                if (previewUrl) setAddressBarUrl(previewUrl);
            }, [previewUrl]);

            useEffect(() => {
                if (!window.crossOriginIsolated) return;
                let mounted = true;

                async function bootOS() {
                    try {
                        if (!window.__wcPromise) {
                            window.__wcPromise = WebContainer.boot();
                        }
                        const container = await window.__wcPromise;
                        if (!mounted) return;

                        setWc(container);
                        await container.mount(files);
                        
                        container.on('server-ready', (port, url) => {
                            setPreviewUrl(url);
                            setServerReady(true);
                        });

                        setIsBooting(false);
                        startShell(container);
                    } catch (error) {
                        console.error("OS Boot Error:", error);
                    }
                }
                bootOS();

                return () => { mounted = false; };
            }, []);

            const startShell = async (container) => {
                if (!terminalRef.current || window.__shellStarted) return;
                window.__shellStarted = true;

                const term = new Terminal({
                    convertEol: true, 
                    theme: { background: '#0d1117', foreground: '#c9d1d9' },
                    fontFamily: '"Fira Code", Consolas, monospace', 
                    fontSize: 13
                });
                
                const fitAddon = new FitAddon();
                term.loadAddon(fitAddon);
                term.open(terminalRef.current);
                
                const resizeObserver = new ResizeObserver(() => fitAddon.fit());
                resizeObserver.observe(terminalRef.current);
                setTimeout(() => fitAddon.fit(), 100);

                term.writeln('\x1b[1;34m[SYSTEM]\x1b[0m \x1b[1mWebAssembly Engine Initialized.\x1b[0m');

                const shellProcess = await container.spawn('jsh', {
                    terminal: { cols: term.cols, rows: term.rows }
                });

                shellProcess.output.pipeTo(new WritableStream({ write(data) { term.write(data); } }));
                const input = shellProcess.input.getWriter();
                term.onData((data) => input.write(data));

                // Installs packages then starts node server
                await input.write('npm install && npm run start\r');
            };

            const handleEditorChange = (value) => {
                if (value === undefined) return;
                setFiles(prev => ({ ...prev, [activeFile]: { file: { contents: value } } }));

                if (wc) {
                    clearTimeout(writeTimer.current);
                    writeTimer.current = setTimeout(async () => {
                        try { await wc.fs.writeFile(`/${activeFile}`, value); } 
                        catch(err) { console.error(err); }
                    }, 400); 
                }
            };

            const deployProject = async () => {
                setIsDeploying(true);
                try {
                    const workerFiles = {};
                    for (const [filename, fileData] of Object.entries(files)) {
                        workerFiles[`/${filename}`] = { content: fileData.file.contents };
                    }

                    const response = await fetch('https://ide-router.scenexestuff.workers.dev/api/deploy', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(workerFiles)
                    });

                    if (!response.ok) throw new Error("Deployment API returned an error.");

                    const data = await response.json();
                    
                    // Directly load deployed site in the address bar and preview!
                    setPreviewUrl(data.url);
                    setAddressBarUrl(data.url);
                    const iframe = document.getElementById('preview');
                    if (iframe) iframe.src = data.url;

                } catch (error) {
                    console.error("Deploy failed:", error);
                    alert("Failed to deploy project. Make sure your KV Database is bound in Cloudflare!");
                } finally {
                    setIsDeploying(false);
                }
            };

            // Search logic
            const searchResults = useMemo(() => {
                if (!searchQuery) return [];
                const results = [];
                Object.keys(files).forEach(filename => {
                    const content = files[filename].file.contents;
                    const lines = content.split('\n');
                    lines.forEach((line, i) => {
                        if (line.toLowerCase().includes(searchQuery.toLowerCase())) {
                            results.push({ filename, line: i + 1, text: line.trim() });
                        }
                    });
                });
                return results;
            }, [searchQuery, files]);

            // Splitter Resizing logic
            const startResize = (e, direction) => {
                e.preventDefault();
                const startX = e.clientX;
                const startY = e.clientY;
                const initialSidebarWidth = sidebarWidth;
                const initialPreviewWidth = previewWidth;
                const initialTerminalHeight = terminalHeight;

                document.body.classList.add('resizing');
                document.body.style.cursor = direction === 'terminal' ? 'row-resize' : 'col-resize';

                const onMouseMove = (moveEvent) => {
                    if (direction === 'sidebar') {
                        setSidebarWidth(Math.max(150, Math.min(initialSidebarWidth + (moveEvent.clientX - startX), 800)));
                    } else if (direction === 'preview') {
                        setPreviewWidth(Math.max(300, Math.min(initialPreviewWidth + (startX - moveEvent.clientX), 1200)));
                    } else if (direction === 'terminal') {
                        setTerminalHeight(Math.max(100, Math.min(initialTerminalHeight + (startY - moveEvent.clientY), 800)));
                    }
                };

                const onMouseUp = () => {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                    document.body.classList.remove('resizing');
                    document.body.style.cursor = 'default';
                };

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            };

            if (!window.crossOriginIsolated) {
                return (
                    <div className="h-full w-full flex flex-col items-center justify-center bg-[#0d1117] text-white">
                        <Loader2 className="w-12 h-12 animate-spin text-blue-500 mb-6" />
                        <h2 className="text-3xl font-bold tracking-tight">Initializing Environment</h2>
                        <p className="text-gray-400 mt-2">Bypassing CDN blocks and booting sandbox...</p>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-full w-full">
                    {/* Top Navbar */}
                    <div className="h-10 flex-shrink-0 bg-[#161b22] border-b border-[#30363d] flex items-center px-4 select-none z-20">
                        <div className="flex items-center">
                            <Cpu className="w-4 h-4 text-blue-400 mr-2" />
                            <span className="font-semibold text-gray-200 text-sm tracking-wide">015x Web IDE</span>
                        </div>
                        <div className="ml-8 text-[11px] font-medium text-gray-400 uppercase tracking-wider">
                            {isBooting ? <span className="text-yellow-500">Booting Macro OS...</span> 
                            : !serverReady ? <span className="text-blue-400">Starting Server...</span> : null}
                        </div>
                        
                        <button onClick={deployProject} disabled={isDeploying || !serverReady} 
                            className="ml-auto flex items-center bg-blue-600 hover:bg-blue-500 disabled:bg-gray-700 disabled:text-gray-400 text-white text-[11px] font-bold uppercase tracking-wider px-4 py-1.5 rounded transition-colors shadow">
                            {isDeploying ? <Loader2 className="w-3.5 h-3.5 animate-spin mr-2" /> : <Upload className="w-3.5 h-3.5 mr-2" />}
                            {isDeploying ? 'Deploying...' : 'Deploy to 015x.dev'}
                        </button>
                    </div>

                    <div className="flex-1 flex min-h-0 overflow-hidden">
                        
                        {/* Activity Bar (Tabs) */}
                        <div className="w-12 bg-[#161b22] border-r border-[#30363d] flex flex-col items-center py-2 flex-shrink-0 z-10">
                            <button title="Files" onClick={() => setSidebarTab('files')} className={`p-2 rounded mb-2 transition-colors ${sidebarTab === 'files' ? 'text-white border-l-2 border-blue-500' : 'text-gray-500 hover:text-gray-300'}`}>
                                <Files className="w-5 h-5" />
                            </button>
                            <button title="Search" onClick={() => setSidebarTab('search')} className={`p-2 rounded mb-2 transition-colors ${sidebarTab === 'search' ? 'text-white border-l-2 border-blue-500' : 'text-gray-500 hover:text-gray-300'}`}>
                                <Search className="w-5 h-5" />
                            </button>
                            <button title="Settings" onClick={() => setSidebarTab('settings')} className={`p-2 rounded mt-auto transition-colors ${sidebarTab === 'settings' ? 'text-white border-l-2 border-blue-500' : 'text-gray-500 hover:text-gray-300'}`}>
                                <Settings className="w-5 h-5" />
                            </button>
                        </div>

                        {/* Sidebar Panel */}
                        <div style={{ width: sidebarWidth }} className="flex-shrink-0 bg-[#0d1117] flex flex-col">
                            {sidebarTab === 'files' && (
                                <div className="flex-1 overflow-y-auto">
                                    <div className="text-[10px] font-bold text-gray-500 uppercase px-4 mb-2 mt-4 tracking-widest">Explorer</div>
                                    {Object.keys(files).map(name => (
                                        <button key={name} onClick={() => setActiveFile(name)}
                                            className={`flex items-center w-full px-4 py-1.5 text-sm transition-colors border-l-2 ${
                                                activeFile === name 
                                                ? 'border-blue-500 bg-[#161b22] text-gray-100' 
                                                : 'border-transparent text-gray-400 hover:bg-[#161b22] hover:text-gray-200'
                                            }`}>
                                            <FileCode2 className={`w-4 h-4 mr-2 ${name.endsWith('.js') || name.endsWith('.json') ? 'text-yellow-400' : name.endsWith('.css') ? 'text-blue-400' : 'text-orange-400'}`}/>
                                            {name}
                                        </button>
                                    ))}
                                </div>
                            )}

                            {sidebarTab === 'search' && (
                                <div className="flex-1 overflow-y-auto p-4 flex flex-col">
                                    <div className="text-[10px] font-bold text-gray-500 uppercase mb-3 tracking-widest">Search</div>
                                    <input 
                                        type="text" 
                                        placeholder="Search files..."
                                        value={searchQuery}
                                        onChange={e => setSearchQuery(e.target.value)}
                                        className="w-full bg-[#0d1117] border border-[#30363d] rounded p-1.5 text-sm text-gray-200 focus:outline-none focus:border-blue-500 mb-3"
                                    />
                                    <div className="flex-1 overflow-y-auto">
                                        {searchResults.map((res, i) => (
                                            <div key={i} className="mb-2 cursor-pointer hover:bg-[#161b22] p-2 rounded transition-colors" onClick={() => setActiveFile(res.filename)}>
                                                <div className="text-xs text-blue-400 font-semibold mb-0.5">{res.filename} : {res.line}</div>
                                                <div className="text-[11px] text-gray-400 truncate">{res.text}</div>
                                            </div>
                                        ))}
                                        {searchQuery && searchResults.length === 0 && <div className="text-xs text-gray-500 p-1">No results found.</div>}
                                    </div>
                                </div>
                            )}

                            {sidebarTab === 'settings' && (
                                <div className="flex-1 overflow-y-auto p-4 flex flex-col space-y-4">
                                    <div className="text-[10px] font-bold text-gray-500 uppercase mb-2 tracking-widest">Editor Settings</div>
                                    
                                    <label className="flex flex-col">
                                        <span className="text-xs text-gray-400 mb-1">Theme</span>
                                        <select value={editorConfig.theme} onChange={e => setEditorConfig({...editorConfig, theme: e.target.value})} className="bg-[#0d1117] border border-[#30363d] text-sm text-gray-200 rounded p-1.5 focus:outline-none focus:border-blue-500">
                                            <option value="vs-dark">Dark (VS Dark)</option>
                                            <option value="vs">Light (VS Light)</option>
                                            <option value="hc-black">High Contrast</option>
                                            <option value="monokai">Monokai</option>
                                        </select>
                                    </label>

                                    <label className="flex flex-col">
                                        <span className="text-xs text-gray-400 mb-1">Word Wrap</span>
                                        <select value={editorConfig.wordWrap} onChange={e => setEditorConfig({...editorConfig, wordWrap: e.target.value})} className="bg-[#0d1117] border border-[#30363d] text-sm text-gray-200 rounded p-1.5 focus:outline-none focus:border-blue-500">
                                            <option value="on">On</option>
                                            <option value="off">Off</option>
                                            <option value="wordWrapColumn">Word Wrap Column</option>
                                            <option value="bounded">Bounded</option>
                                        </select>
                                    </label>

                                    <label className="flex flex-col">
                                        <span className="text-xs text-gray-400 mb-1">Cursor Style</span>
                                        <select value={editorConfig.cursorStyle} onChange={e => setEditorConfig({...editorConfig, cursorStyle: e.target.value})} className="bg-[#0d1117] border border-[#30363d] text-sm text-gray-200 rounded p-1.5 focus:outline-none focus:border-blue-500">
                                            <option value="line">Line</option>
                                            <option value="block">Block</option>
                                            <option value="underline">Underline</option>
                                            <option value="line-thin">Line Thin</option>
                                            <option value="block-outline">Block Outline</option>
                                            <option value="underline-thin">Underline Thin</option>
                                        </select>
                                    </label>

                                    <label className="flex flex-col">
                                        <span className="text-xs text-gray-400 mb-1">Cursor Animation</span>
                                        <select value={editorConfig.cursorBlinking} onChange={e => setEditorConfig({...editorConfig, cursorBlinking: e.target.value})} className="bg-[#0d1117] border border-[#30363d] text-sm text-gray-200 rounded p-1.5 focus:outline-none focus:border-blue-500">
                                            <option value="blink">Blink</option>
                                            <option value="smooth">Smooth</option>
                                            <option value="phase">Phase</option>
                                            <option value="expand">Expand</option>
                                            <option value="solid">Solid</option>
                                        </select>
                                    </label>

                                    <label className="flex flex-col">
                                        <span className="text-xs text-gray-400 mb-1">Font Size</span>
                                        <input type="number" min="8" max="32" value={editorConfig.fontSize} onChange={e => setEditorConfig({...editorConfig, fontSize: parseInt(e.target.value) || 14})} className="bg-[#0d1117] border border-[#30363d] text-sm text-gray-200 rounded p-1.5 focus:outline-none focus:border-blue-500" />
                                    </label>
                                </div>
                            )}
                        </div>

                        {/* Splitter Sidebar-Editor */}
                        <div className="w-1 cursor-col-resize hover:bg-blue-500 bg-[#30363d] flex-shrink-0 transition-colors z-10" onMouseDown={(e) => startResize(e, 'sidebar')} />

                        {/* Editor Area */}
                        <div className="flex-1 flex flex-col min-w-0 bg-[#0d1117]">
                            <div className="h-9 flex-shrink-0 bg-[#161b22] flex items-end px-2 border-b border-[#30363d]">
                                <div className="flex items-center px-4 py-2 bg-[#0d1117] border-t-2 border-blue-500 text-gray-200 text-xs rounded-t-sm shadow-lg">
                                    {activeFile}
                                </div>
                            </div>
                            <div className="flex-1 relative">
                                <div className="absolute inset-0">
                                    <Editor 
                                        theme={editorConfig.theme}
                                        language={activeFile.endsWith('.js') ? 'javascript' : activeFile.endsWith('.css') ? 'css' : activeFile.endsWith('.html') ? 'html' : 'json'}
                                        value={files[activeFile].file.contents}
                                        onChange={handleEditorChange}
                                        options={{ 
                                            minimap: { enabled: false }, 
                                            fontSize: editorConfig.fontSize, 
                                            fontFamily: 'Menlo, Monaco, Consolas, monospace', 
                                            padding: { top: 16 },
                                            wordWrap: editorConfig.wordWrap,
                                            cursorStyle: editorConfig.cursorStyle,
                                            cursorBlinking: editorConfig.cursorBlinking,
                                            smoothScrolling: true,
                                            cursorSmoothCaretAnimation: "on"
                                        }}
                                    />
                                </div>
                            </div>
                        </div>

                        {/* Splitter Editor-Preview */}
                        <div className="w-1 cursor-col-resize hover:bg-blue-500 bg-[#30363d] flex-shrink-0 transition-colors z-10" onMouseDown={(e) => startResize(e, 'preview')} />

                        {/* Preview Panel */}
                        <div style={{ width: previewWidth }} className="flex-shrink-0 bg-[#0d1117] flex flex-col shadow-2xl">
                            {/* Address Bar Toolbar */}
                            <div className="h-10 flex-shrink-0 bg-[#161b22] border-b border-[#30363d] flex items-center px-3 space-x-2">
                                <button onClick={() => { const iframe = document.getElementById('preview'); if (iframe) iframe.src = iframe.src; }} className="p-1.5 text-gray-400 hover:bg-[#30363d] hover:text-white rounded transition-colors" title="Reload Frame">
                                    <RotateCcw className="w-3.5 h-3.5" />
                                </button>
                                <div className="flex-1 bg-[#0d1117] border border-[#30363d] rounded px-3 py-1.5 flex items-center overflow-hidden">
                                    <Globe className="w-3 h-3 mr-2 text-gray-500 flex-shrink-0"/> 
                                    <input 
                                        className="bg-transparent border-none outline-none text-[11px] text-gray-300 font-mono flex-1 w-full placeholder-gray-600"
                                        placeholder="Waiting for localhost..."
                                        value={addressBarUrl}
                                        onChange={(e) => setAddressBarUrl(e.target.value)}
                                        onKeyDown={(e) => {
                                            if (e.key === 'Enter') {
                                                const iframe = document.getElementById('preview');
                                                if (iframe) iframe.src = addressBarUrl;
                                            }
                                        }}
                                    />
                                </div>
                            </div>
                            
                            {/* Iframe View */}
                            <div className="flex-1 relative bg-white">
                                {!previewUrl ? (
                                    <div className="absolute inset-0 flex flex-col items-center justify-center text-gray-400 bg-[#0d1117]">
                                        <Loader2 className="w-8 h-8 animate-spin mb-4 text-blue-500" /> 
                                        <p className="text-sm">Awaiting Server Start...</p>
                                    </div>
                                ) : (
                                    <iframe id="preview" src={previewUrl} className="absolute inset-0 w-full h-full border-none bg-white" allow="cross-origin-isolated" />
                                )}
                            </div>
                            
                            {/* Splitter Preview-Terminal */}
                            <div className="h-1 cursor-row-resize hover:bg-blue-500 bg-[#30363d] flex-shrink-0 transition-colors z-10" onMouseDown={(e) => startResize(e, 'terminal')} />

                            {/* Terminal */}
                            <div style={{ height: terminalHeight }} className="flex-shrink-0 flex flex-col bg-[#0d1117]">
                                <div className="h-8 flex-shrink-0 bg-[#161b22] flex items-center px-4 text-[10px] font-bold uppercase tracking-widest text-gray-500 border-b border-[#30363d]">
                                    <TerminalIcon className="w-3 h-3 mr-2" /> Terminal
                                </div>
                                <div className="flex-1 relative p-1">
                                    <div className="absolute inset-0 p-1 overflow-hidden" ref={terminalRef}></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
