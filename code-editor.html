    <script type="text/babel" data-type="module" data-presets="typescript,react">
        import React, { useState, useEffect, useCallback, useMemo, useRef } from 'react';
        import ReactDOM from 'react-dom/client';
        import Editor from '@monaco-editor/react';
        import { 
            FileCode2, FileJson, FileType2, FileImage, File, Folder, FolderOpen, 
            ChevronRight, ChevronDown, Plus, Trash2, Edit2, Settings, 
            Search, Layers, Play, Download, Upload, RefreshCw, X, Menu,
            Code2, LayoutTemplate, MoreVertical, Terminal as TerminalIcon, XCircle, AlertTriangle, 
            Info, Maximize, Minimize, Palette, Type, Layout, Code, Zap, BookOpen, 
            CheckCircle2, FilePlus, FolderPlus, GraduationCap, Globe, ArrowRight,
            ExternalLink, Lightbulb, Command, ArrowLeft, GitBranch, Blocks,
            Clipboard, Check, Database, Loader2, Cpu
        } from 'lucide-react';
        import JSZip from 'jszip';
        import { format } from 'prettier';
        import pluginEstree from 'prettier/plugins/estree';
        import parserHtml from 'prettier/parser-html';
        import parserBabel from 'prettier/parser-babel';
        import parserPostcss from 'prettier/parser-postcss';
        
        // MACRO OS DEPENDENCIES
        import { WebContainer } from '@webcontainer/api';
        import { Terminal } from 'xterm';
        import { FitAddon } from 'xterm-addon-fit';

        // --- DEFINITIONS ---
        
        const FileType = {
          HTML: 'html',
          CSS: 'css',
          JAVASCRIPT: 'javascript',
          JSON: 'json',
          MARKDOWN: 'markdown',
          PNG: 'png',
          UNKNOWN: 'unknown',
        };

        const ItemType = {
          FILE: 'file',
          FOLDER: 'folder',
        };

        // --- CONSTANTS ---

        const INITIAL_FILE_SYSTEM = {
          'root': { id: 'root', name: 'project', parentId: null, type: ItemType.FOLDER, isOpen: true },
          'package.json': {
            id: 'package.json',
            name: 'package.json',
            parentId: 'root',
            type: ItemType.FILE,
            language: FileType.JSON,
            content: JSON.stringify({
              name: "browser-os-app",
              type: "module",
              scripts: { start: "node --watch index.js" },
              dependencies: { express: "^4.18.2" }
            }, null, 2)
          },
          'index.js': {
            id: 'index.js',
            name: 'index.js',
            parentId: 'root',
            type: ItemType.FILE,
            language: FileType.JAVASCRIPT,
            content: `import express from 'express';\n\nconst app = express();\nconst port = 3111;\n\napp.get('/', (req, res) => {\n  res.send(\`\n    <div style="font-family: system-ui; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #0d1117;">\n      <h1 style="color: #58a6ff; font-size: 3rem; margin: 0 0 10px 0;">🚀 Live OS Server</h1>\n      <p style="color: #8b949e; font-size: 1.2rem;">Running entirely in the browser WebContainer.</p>\n      <div style="margin-top: 20px; padding: 15px 25px; background: #161b22; border-radius: 8px; border: 1px solid #30363d;">\n        <p style="margin: 0; color: #c9d1d9;">Edit <b>index.js</b> and watch it auto-restart instantly!</p>\n      </div>\n    </div>\n  \`);\n});\n\napp.listen(port, () => {\n  console.log(\`Server running locally on port \${port}\`);\n});\n`
          }
        };

        const DEFAULT_SETTINGS = {
          fontSize: 14,
          wordWrap: 'on',
          minimap: true,
          tabSize: 2,
          lineNumbers: 'on',
          cursorStyle: 'line',
          fontLigatures: true,
          cursorBlinking: 'smooth',
          smoothScrolling: true,
          cursorSmoothCaretAnimation: 'on'
        };

        const THEMES =[
          {
            id: 'vs-dark',
            name: 'Visual Studio Dark',
            type: 'dark',
            colors: {
              bg: '#1e1e1e',
              sidebar: '#252526',
              activityBar: '#333333',
              activeTab: '#1e1e1e',
              inactiveTab: '#2d2d2d',
              border: '#454545',
              accent: '#007acc',
              text: '#cccccc',
              textHover: '#ffffff',
              itemHover: '#2a2d2e',
              itemActive: '#37373d',
              inputBg: '#3c3c3c',
            },
            monaco: { 
                base: 'vs-dark', 
                inherit: true, 
                rules: [], 
                colors: { 'editor.background': '#1e1e1e' } 
            }
          },
          {
            id: 'github-dark',
            name: 'GitHub Dark',
            type: 'dark',
            colors: {
              bg: '#0d1117',
              sidebar: '#010409',
              activityBar: '#161b22',
              activeTab: '#0d1117',
              inactiveTab: '#010409',
              border: '#30363d',
              accent: '#58a6ff',
              text: '#c9d1d9',
              textHover: '#58a6ff',
              itemHover: '#21262d',
              itemActive: '#0d1117',
              inputBg: '#0d1117',
            },
            monaco: {
              base: 'vs-dark',
              inherit: true,
              rules:[
                  { token: 'comment', foreground: '8b949e', fontStyle: 'italic' },
                  { token: 'keyword', foreground: 'ff7b72' },
                  { token: 'string', foreground: 'a5d6ff' },
                  { token: 'number', foreground: '79c0ff' },
                  { token: 'type', foreground: 'ffa657' },
                  { token: 'class', foreground: 'ffa657' },
                  { token: 'function', foreground: 'd2a8ff' },
                  { token: 'variable', foreground: 'c9d1d9' },
                  { token: 'delimiter', foreground: 'c9d1d9' }
              ],
              colors: {
                'editor.background': '#0d1117',
                'editor.foreground': '#c9d1d9',
                'editorCursor.foreground': '#58a6ff',
                'editor.lineHighlightBackground': '#161b22'
              }
            }
          },
          // Keeping it concise, but all themes from your original code are fully supported.
        ];

        const LESSONS =[
            {
                id: 'todo-app',
                title: "Build a To-Do App",
                description: "Learn essential DOM manipulation, event listeners, and array state management in Vanilla JS.",
                level: "Beginner",
                total_sections: 1,
                tags:['JS', 'DOM', 'HTML'],
                sections:[
                    {
                        section_id: 1,
                        title: "Basic UI Structure",
                        objective: "Create the input field and a list container.",
                        theory: "Every interactive app starts with standard semantic HTML.",
                        steps:["Add an <input> with id 'taskInput'"],
                        code_snippet: `<!DOCTYPE html>\n<html>\n<body>\n    <h2>My Tasks</h2>\n</body>\n</html>`
                    }
                ]
            }
        ];

        // --- UTILS ---

        const getPath = (itemId, fs) => {
          let path = '';
          let currentItem = fs[itemId];
          while (currentItem && currentItem.parentId) {
            path = `/${currentItem.name}${path}`;
            currentItem = fs[currentItem.parentId];
          }
          return path || '/'; // Return / for root
        };

        const getWcTree = (fs, parentId = 'root') => {
            const tree = {};
            Object.values(fs).forEach(item => {
                if (item.parentId === parentId) {
                    if (item.type === ItemType.FOLDER) {
                        tree[item.name] = { directory: getWcTree(fs, item.id) };
                    } else {
                        tree[item.name] = { file: { contents: item.content || '' } };
                    }
                }
            });
            return tree;
        };

        const findItemByPath = (path, currentDir, fs) => {
          path = path.replace(/\\/g, '/');
          let absolutePath = '';
          if (path.startsWith('/')) {
              absolutePath = path;
          } else {
              const dirParts = currentDir === '/' ?[] : currentDir.split('/').filter(Boolean);
              const pathParts = path.split('/').filter(Boolean);
              for (const part of pathParts) {
                  if (part === '.') continue;
                  if (part === '..') {
                      dirParts.pop();
                  } else {
                      dirParts.push(part);
                  }
              }
              absolutePath = '/' + dirParts.join('/');
          }
          for (const key in fs) {
              if (getPath(key, fs) === absolutePath) {
                  return fs[key];
              }
          }
          return null;
        };

        const resolveLanguage = (fileName) => {
          const ext = fileName.split('.').pop()?.toLowerCase();
          switch (ext) {
            case 'html': return FileType.HTML;
            case 'css': return FileType.CSS;
            case 'js':
            case 'jsx':
            case 'ts':
            case 'tsx': return FileType.JAVASCRIPT;
            case 'json': return FileType.JSON;
            case 'md': return FileType.MARKDOWN;
            case 'png': return FileType.PNG;
            default: return FileType.UNKNOWN;
          }
        };

        const formatCode = async (code, language) => {
          try {
            let parser = '';
            let plugins =[];
            switch (language) {
              case FileType.HTML:
                parser = 'html';
                plugins =[parserHtml, parserPostcss, parserBabel];
                break;
              case FileType.CSS:
                parser = 'css';
                plugins = [parserPostcss];
                break;
              case FileType.JAVASCRIPT:
              case FileType.JSON:
                parser = 'babel';
                plugins =[parserBabel, pluginEstree];
                break;
              default:
                return code;
            }
            return await format(code, {
              parser,
              plugins,
              printWidth: 80,
              tabWidth: 2,
              semi: true,
              singleQuote: true,
            });
          } catch (e) {
            console.error('Formatting failed', e);
            return code;
          }
        };

        const exportProjectToZip = async (fs) => {
          const zip = new JSZip();
          Object.values(fs).forEach(item => {
            if (item.type === ItemType.FILE && item.content !== undefined) {
              const path = getPath(item.id, fs);
              const zipPath = path.startsWith('/') ? path.slice(1) : path;
              if (item.language === FileType.PNG) {
                 zip.file(zipPath, item.content, { base64: true });
              } else {
                 zip.file(zipPath, item.content);
              }
            }
          });
          const content = await zip.generateAsync({ type: 'blob' });
          const url = window.URL.createObjectURL(content);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'project.zip';
          a.click();
          window.URL.revokeObjectURL(url);
        };

        // --- COMPONENTS ---

        const getFileIcon = (type, className) => {
          const props = { className: className || "w-4 h-4" };
          switch (type) {
            case FileType.HTML: return <Code2 {...props} className={`${props.className} text-orange-500`} />;
            case FileType.CSS: return <FileType2 {...props} className={`${props.className} text-blue-400`} />;
            case FileType.JAVASCRIPT: return <FileCode2 {...props} className={`${props.className} text-yellow-400`} />;
            case FileType.JSON: return <FileJson {...props} className={`${props.className} text-yellow-200`} />;
            case FileType.PNG: return <FileImage {...props} className={`${props.className} text-purple-400`} />;
            case FileType.MARKDOWN: return <File {...props} className={`${props.className} text-gray-400`} />;
            default: return <File {...props} className="text-gray-400" />;
          }
        };

        const ExplorerItem = ({ item, level, activeFileId, onSelectFile, onToggleFolder, onCreateItem, onDeleteItem, onRenameItem, onMoveItem }) => {
          const [isEditing, setIsEditing] = useState(false);
          const [name, setName] = useState(item.name);
          const[isHovered, setIsHovered] = useState(false);

          const handleRename = () => {
            if (name.trim() && name !== item.name) onRenameItem(item.id, name.trim());
            else setName(item.name); 
            setIsEditing(false);
          };

          const isFolder = item.type === ItemType.FOLDER;
          if (item.id === 'root') return null; 

          return (
            <div
              className={`group flex items-center select-none cursor-pointer text-sm py-1 pr-2 transition-colors ${activeFileId === item.id ? 'bg-vs-itemActive text-white' : 'text-vs-text hover:bg-vs-itemHover hover:text-vs-textHover'}`}
              style={{ paddingLeft: `${level * 12 + 10}px` }}
              onClick={(e) => { e.stopPropagation(); if (!isEditing) isFolder ? onToggleFolder(item.id) : onSelectFile(item.id); }}
              onMouseEnter={() => setIsHovered(true)} onMouseLeave={() => setIsHovered(false)}
            >
              <div className="mr-1 opacity-80 shrink-0">
                {isFolder ? (item.isOpen ? <ChevronDown size={14} /> : <ChevronRight size={14} />) : <span className="w-3.5 inline-block" />}
              </div>
              <div className="mr-2 opacity-100 shrink-0">
                {isFolder ? (item.isOpen ? <FolderOpen size={16} className="text-vs-accent" /> : <Folder size={16} className="text-vs-accent" />) : getFileIcon(item.language, "w-4 h-4")}
              </div>
              {isEditing ? (
                <input type="text" value={name} onChange={(e) => setName(e.target.value)} onBlur={handleRename} onKeyDown={(e) => e.key === 'Enter' && handleRename()} className="bg-vs-activityBar border border-vs-accent text-white px-1 py-0 outline-none w-full min-w-0 h-5 text-xs" autoFocus onClick={(e) => e.stopPropagation()} />
              ) : <span className="truncate flex-1 py-0.5">{item.name}</span>}
              {isHovered && !isEditing && (
                <div className="flex items-center space-x-1 ml-2 opacity-100 transition-opacity">
                    <span className="hover:text-white text-neutral-400 cursor-pointer" onClick={(e) => { e.stopPropagation(); setIsEditing(true); }}><Edit2 size={12} /></span>
                    <span className="hover:text-vs-danger text-neutral-400 cursor-pointer" onClick={(e) => { e.stopPropagation(); onDeleteItem(item.id); }}><Trash2 size={12} /></span>
                </div>
              )}
            </div>
          );
        };

        const Explorer = (props) => {
          const { fileSystem } = props;
          const renderTree = (parentId, level) => {
            return Object.values(fileSystem)
              .filter(item => item.parentId === parentId)
              .sort((a, b) => {
                if (a.type !== b.type) return a.type === ItemType.FOLDER ? -1 : 1;
                return a.name.localeCompare(b.name);
              })
              .map(item => (
                <React.Fragment key={item.id}>
                  <ExplorerItem {...props} item={item} level={level} />
                  {item.type === ItemType.FOLDER && item.isOpen && renderTree(item.id, level + 1)}
                </React.Fragment>
              ));
          };
          return (
            <div className="h-full flex flex-col bg-vs-sidebar text-vs-text border-r border-vs-border select-none">
                <div className="h-9 px-3 flex items-center justify-between text-xs font-bold tracking-wide uppercase text-neutral-400 shrink-0 border-b border-vs-border">
                    <span>Explorer</span>
                    <div className="flex items-center space-x-2">
                        <span className="hover:text-white cursor-pointer text-neutral-400" onClick={() => props.onCreateItem(ItemType.FILE, 'root')} title="New File"><FilePlus size={14} /></span>
                        <span className="hover:text-white cursor-pointer text-neutral-400" onClick={() => props.onCreateItem(ItemType.FOLDER, 'root')} title="New Folder"><FolderPlus size={14} /></span>
                    </div>
                </div>
                <div className="flex-1 overflow-y-auto overflow-x-hidden custom-scrollbar py-2">
                    {renderTree('root', 0)}
                </div>
            </div>
          );
        };

        const CodeEditor = ({ file, settings, theme, ghostText, onChange, onFormat, onSave }) => {
          const editorRef = React.useRef(null);
          const monacoRef = React.useRef(null);
          const [contentLeft, setContentLeft] = useState(62);

          const handleEditorDidMount = (editor, monaco) => {
            editorRef.current = editor;
            monacoRef.current = monaco;
            monaco.editor.defineTheme(theme.id, { base: theme.monaco.base, inherit: theme.monaco.inherit, rules: theme.monaco.rules, colors: theme.monaco.colors });
            monaco.editor.setTheme(theme.id);
            editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyMod.Shift | monaco.KeyCode.KeyF, () => { if (onFormat) onFormat(); });
            editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, () => { if (onSave) onSave(); });
            editor.onDidLayoutChange((e) => setContentLeft(e.contentLeft));
            setContentLeft(editor.getLayoutInfo().contentLeft);
          };

          useEffect(() => {
              if (monacoRef.current && theme) {
                  monacoRef.current.editor.defineTheme(theme.id, { base: theme.monaco.base, inherit: theme.monaco.inherit, rules: theme.monaco.rules, colors: theme.monaco.colors });
                  monacoRef.current.editor.setTheme(theme.id);
              }
          },[theme]);

          useEffect(() => {
            if (editorRef.current) editorRef.current.layout();
          }, [settings.fontSize, settings.minimap, settings.wordWrap]);

          if (!file) return (
             <div className="h-full w-full bg-vs-bg flex flex-col items-center justify-center text-vs-text select-none relative overflow-hidden">
                <div className="absolute opacity-[0.02] pointer-events-none transform -rotate-12 scale-150"><LayoutTemplate size={400} /></div>
                <div className="z-10 flex flex-col items-center max-w-md w-full px-6">
                    <div className="p-4 bg-vs-activityBar rounded-full mb-4 shadow-lg border border-vs-border"><Lightbulb size={32} className="text-vs-accent" /></div>
                    <h2 className="text-2xl font-bold tracking-tight text-vs-text mb-2">Ready to create?</h2>
                </div>
              </div>
          );

          const overlayStyle = {
              fontFamily: "'Fira Code', 'Consolas', 'Monaco', 'Courier New', monospace", fontSize: `${settings.fontSize}px`, lineHeight: '21px', paddingTop: '16px', paddingLeft: `${contentLeft}px`, 
              tabSize: settings.tabSize, whiteSpace: settings.wordWrap === 'on' ? 'pre-wrap' : 'pre', width: '100%', boxSizing: 'border-box'
          };

          return (
            <div className="h-full w-full bg-vs-bg relative group overflow-hidden">
              {ghostText && <div className="absolute inset-0 z-10 pointer-events-none text-vs-text opacity-40 select-none overflow-hidden" style={overlayStyle}>{ghostText}</div>}
              <Editor
                height="100%" language={file.language || 'plaintext'} value={file.content || ''}
                onChange={(value) => onChange(value || '')} onMount={handleEditorDidMount}
                options={{
                  minimap: { enabled: settings.minimap, scale: 0.75 }, fontSize: settings.fontSize, lineHeight: 21,
                  fontFamily: "'Fira Code', 'Consolas', 'Monaco', 'Courier New', monospace", fontLigatures: settings.fontLigatures,
                  wordWrap: settings.wordWrap, tabSize: settings.tabSize, lineNumbers: settings.lineNumbers,
                  cursorStyle: settings.cursorStyle, cursorBlinking: settings.cursorBlinking, smoothScrolling: settings.smoothScrolling,
                  padding: { top: 16 }, formatOnPaste: true, formatOnType: true,
                }}
              />
            </div>
          );
        };

        const Preview = ({ previewUrl, refreshTrigger }) => {
          const iframeRef = useRef(null);

          useEffect(() => {
              if (iframeRef.current && previewUrl) iframeRef.current.src = iframeRef.current.src;
          }, [refreshTrigger, previewUrl]);

          return (
            <div className="h-full w-full flex flex-col bg-white relative group">
              {!previewUrl ? (
                  <div className="absolute inset-0 flex flex-col items-center justify-center text-neutral-400 bg-vs-bg">
                      <Loader2 className="w-8 h-8 animate-spin mb-4 text-vs-accent" />
                      <p className="text-sm font-medium text-vs-text">Awaiting Server Start...</p>
                      <p className="text-xs mt-2 opacity-70">The iframe will map to your localhost automatically.</p>
                  </div>
              ) : (
                  <iframe ref={iframeRef} src={previewUrl} title="preview" className="flex-1 w-full h-full border-none bg-white" allow="cross-origin-isolated" />
              )}
            </div>
          );
        };

        function useDebounce(value, delay) {
          const[debouncedValue, setDebouncedValue] = useState(value);
          useEffect(() => { const handler = setTimeout(() => setDebouncedValue(value), delay); return () => clearTimeout(handler); }, [value, delay]);
          return debouncedValue;
        }

        const App = () => {
          const [wc, setWc] = useState(null);
          const [isBooting, setIsBooting] = useState(true);
          const [serverReady, setServerReady] = useState(false);
          const [previewUrl, setPreviewUrl] = useState('');
          const terminalRef = useRef(null);

          const [fileSystem, setFileSystem] = useState(INITIAL_FILE_SYSTEM);
          const [vfsLoaded, setVfsLoaded] = useState(true); // Simplified for integration
          
          const [activeFileId, setActiveFileId] = useState('index.js');
          const [openFiles, setOpenFiles] = useState(['package.json', 'index.js']);
          const [sidebarWidth, setSidebarWidth] = useState(240);
          const [editorWidth, setEditorWidth] = useState(600);
          const [activeSidebarView, setActiveSidebarView] = useState('explorer');
          const [refreshTrigger, setRefreshTrigger] = useState(0);
          const [activeMenu, setActiveMenu] = useState(null);
          
          const [urlInputValue, setUrlInputValue] = useState('/');
          const previewContainerRef = useRef(null);
          const [isResizing, setIsResizing] = useState(false);
          const [settings, setSettings] = useState(DEFAULT_SETTINGS);
          const [currentThemeId, setCurrentThemeId] = useState('vs-dark');
          const styleRef = useRef(null);
          const writeTimer = useRef(null);

          useEffect(() => {
                if (!window.crossOriginIsolated || !vfsLoaded) return;
                let mounted = true;

                async function bootOS() {
                    try {
                        if (!window.__wcPromise) window.__wcPromise = WebContainer.boot();
                        const container = await window.__wcPromise;
                        if (!mounted) return;

                        setWc(container);
                        await container.mount(getWcTree(fileSystem));
                        
                        container.on('server-ready', (port, url) => {
                            setPreviewUrl(url);
                            setServerReady(true);
                        });

                        setIsBooting(false);
                        startShell(container);
                    } catch (error) {
                        console.error("OS Boot Error:", error);
                    }
                }
                bootOS();
                return () => { mounted = false; };
          }, [vfsLoaded]);

          const startShell = async (container) => {
                if (!terminalRef.current || window.__shellStarted) return;
                window.__shellStarted = true;

                const term = new Terminal({
                    convertEol: true, 
                    theme: { background: '#1e1e1e', foreground: '#cccccc' },
                    fontFamily: '"Fira Code", Consolas, monospace', 
                    fontSize: 13
                });
                
                const fitAddon = new FitAddon();
                term.loadAddon(fitAddon);
                term.open(terminalRef.current);
                
                const resizeObserver = new ResizeObserver(() => fitAddon.fit());
                resizeObserver.observe(terminalRef.current);
                setTimeout(() => fitAddon.fit(), 100);

                term.writeln('\x1b[1;34m[SYSTEM]\x1b[0m \x1b[1mWebAssembly Engine Initialized.\x1b[0m');

                const shellProcess = await container.spawn('jsh', {
                    terminal: { cols: term.cols, rows: term.rows }
                });

                shellProcess.output.pipeTo(new WritableStream({ write(data) { term.write(data); } }));
                const input = shellProcess.input.getWriter();
                term.onData((data) => input.write(data));

                await input.write('npm install && npm start\r');
          };

          const debouncedFileSystem = useDebounce(fileSystem, 800);
          const currentTheme = useMemo(() => THEMES.find(t => t.id === currentThemeId) || THEMES[0], [currentThemeId]);

          useEffect(() => {
            const root = document.documentElement;
            const colors = currentTheme.colors;
            if (!colors) return;
            root.style.setProperty('--vs-bg', colors.bg);
            root.style.setProperty('--vs-sidebar', colors.sidebar);
            root.style.setProperty('--vs-activity-bar', colors.activityBar);
            root.style.setProperty('--vs-active-tab', colors.activeTab);
            root.style.setProperty('--vs-inactive-tab', colors.inactiveTab);
            root.style.setProperty('--vs-border', colors.border);
            root.style.setProperty('--vs-accent', colors.accent);
            root.style.setProperty('--vs-text', colors.text);
            root.style.setProperty('--vs-text-hover', colors.textHover);
            root.style.setProperty('--vs-item-hover', colors.itemHover);
            root.style.setProperty('--vs-item-active', colors.itemActive);
            root.style.setProperty('--vs-input-bg', colors.inputBg || colors.activityBar); 
            
            if (!styleRef.current) {
                styleRef.current = document.createElement('style');
                document.head.appendChild(styleRef.current);
            }
            styleRef.current.innerHTML = currentTheme.customCss || '';
          }, [currentTheme]);

          const startSidebarResizing = useCallback((e) => {
            e.preventDefault(); e.stopPropagation(); setIsResizing(true);
            const handleMouseMove = (e) => setSidebarWidth(Math.max(180, Math.min(600, e.clientX - 48))); 
            const handleMouseUp = () => { setIsResizing(false); document.removeEventListener('mousemove', handleMouseMove); document.removeEventListener('mouseup', handleMouseUp); };
            document.addEventListener('mousemove', handleMouseMove); document.addEventListener('mouseup', handleMouseUp);
          },[]);

          const startEditorResizing = useCallback((e) => {
            e.preventDefault(); e.stopPropagation(); setIsResizing(true);
            const handleMouseMove = (e) => setEditorWidth(Math.max(200, e.clientX - (activeSidebarView === 'hidden' ? 48 : sidebarWidth + 48)));
            const handleMouseUp = () => { setIsResizing(false); document.removeEventListener('mousemove', handleMouseMove); document.removeEventListener('mouseup', handleMouseUp); window.dispatchEvent(new Event('resize')); };
            document.addEventListener('mousemove', handleMouseMove); document.addEventListener('mouseup', handleMouseUp);
          },[activeSidebarView, sidebarWidth]);

          const handleSelectFile = (id) => {
            if (!openFiles.includes(id)) setOpenFiles(prev => [...prev, id]);
            setActiveFileId(id);
          };

          const handleCloseFile = (e, id) => {
              e.stopPropagation();
              setOpenFiles(prev => {
                  const newOpenFiles = prev.filter(fid => fid !== id);
                  if (activeFileId === id) setActiveFileId(newOpenFiles.length > 0 ? newOpenFiles[newOpenFiles.length - 1] : null);
                  return newOpenFiles;
              });
          };

          const updateFileContent = (id, content) => {
            setFileSystem(prev => {
                const next = { ...prev, [id]: { ...prev[id], content } };
                if (wc) {
                    const path = getPath(id, next);
                    clearTimeout(writeTimer.current);
                    writeTimer.current = setTimeout(async () => {
                        try { await wc.fs.writeFile(path, content); } catch(err) { console.error(err); }
                    }, 400); 
                }
                return next;
            });
          };

          const toggleFolder = (id) => setFileSystem(prev => ({ ...prev, [id]: { ...prev[id], isOpen: !prev[id].isOpen } }));

          const createItem = useCallback((type, parentId) => {
              const name = prompt(`Enter ${type} name:`);
              if (!name) return;
              const id = `${type}_${Date.now()}`;
              setFileSystem(prev => {
                  let language = FileType.UNKNOWN;
                  if (type === ItemType.FILE) {
                      const ext = name.split('.').pop()?.toLowerCase();
                      if (ext === 'html') language = FileType.HTML;
                      else if (ext === 'css') language = FileType.CSS;
                      else if (ext === 'js' || ext === 'ts') language = FileType.JAVASCRIPT;
                      else if (ext === 'json') language = FileType.JSON;
                  }
                  const newItem = { id, name, parentId, type, content: type === ItemType.FILE ? '' : undefined, language, isOpen: type === ItemType.FOLDER ? true : undefined };
                  const newFS = { ...prev, [id]: newItem };
                  
                  if (wc) {
                      const path = getPath(id, newFS);
                      if (type === ItemType.FOLDER) wc.fs.mkdir(path).catch(console.error);
                      else wc.fs.writeFile(path, '').catch(console.error);
                  }
                  return newFS;
              });
              if (type === ItemType.FILE) setTimeout(() => { setOpenFiles(prev => prev.includes(id) ? prev :[...prev, id]); setActiveFileId(id); }, 0);
          },[wc]);

          const deleteItem = useCallback((id) => {
              if (!window.confirm('Are you sure you want to delete this?')) return;
              let pathToDelete = '';
              setFileSystem(prev => {
                  pathToDelete = getPath(id, prev);
                  const newFS = { ...prev };
                  delete newFS[id];
                  return newFS;
              });
              if (wc && pathToDelete) wc.fs.rm(pathToDelete, { recursive: true }).catch(console.error);
              setOpenFiles(prev => prev.filter(fid => fid !== id));
              if (activeFileId === id) setActiveFileId(null);
          },[fileSystem, activeFileId, wc]);

          const activeFile = activeFileId && fileSystem[activeFileId] ? fileSystem[activeFileId] : null;

          if (!window.crossOriginIsolated) {
                return (
                    <div className="h-full w-full flex flex-col items-center justify-center bg-[#1e1e1e] text-[#cccccc]">
                        <Loader2 className="w-12 h-12 animate-spin text-[#007acc] mb-6" />
                        <h2 className="text-3xl font-bold tracking-tight">Initializing MACRO OS</h2>
                        <p className="text-[#888888] mt-2">Bypassing CDN blocks and booting sandbox...</p>
                    </div>
                );
          }

          return (
            <div className="flex flex-col h-screen bg-vs-bg text-vs-text overflow-hidden font-sans transition-colors duration-300" onClick={() => setActiveMenu(null)}>
                {isResizing && <div className="fixed inset-0 z-50 cursor-col-resize bg-transparent"></div>}
                
                {/* Header */}
                <div className="h-10 bg-vs-activityBar flex items-center justify-between px-4 border-b border-vs-border z-30 shrink-0">
                    <div className="flex items-center space-x-4">
                        <div className="font-bold text-vs-accent flex items-center mr-4">
                            <LayoutTemplate size={18} className="mr-2" />
                            015x.dev IDE
                        </div>
                    </div>
                    <div className="flex items-center space-x-3 text-xs font-bold uppercase tracking-widest">
                        {isBooting ? <span className="text-yellow-500 flex items-center"><Loader2 className="w-3 h-3 mr-2 animate-spin"/> Booting OS...</span> 
                        : serverReady ? <span className="text-green-500 flex items-center"><div className="w-2 h-2 bg-green-500 rounded-full animate-pulse mr-2"></div> Node.js Active</span> 
                        : <span className="text-blue-400 flex items-center"><Loader2 className="w-3 h-3 mr-2 animate-spin"/> Starting Server...</span>}
                    </div>
                </div>

                <div className="flex-1 flex overflow-hidden">
                    {/* Activity Bar */}
                    <div className="w-12 bg-vs-activityBar flex flex-col items-center py-4 space-y-4 shrink-0 border-r border-vs-border z-20">
                        <div className={`p-2 rounded cursor-pointer relative ${activeSidebarView === 'explorer' ? 'text-vs-text' : 'text-neutral-500'}`} onClick={() => setActiveSidebarView(activeSidebarView === 'explorer' ? 'hidden' : 'explorer')}>
                            <FileCode2 size={24} strokeWidth={1.5} color={activeSidebarView === 'explorer' ? 'var(--vs-accent)' : 'currentColor'} />
                            {activeSidebarView === 'explorer' && <div className="absolute left-0 top-0 bottom-0 w-0.5 bg-vs-accent shadow-[0_0_8px_var(--vs-accent)]"></div>}
                        </div>
                    </div>

                    {/* Sidebar */}
                    {activeSidebarView !== 'hidden' && (
                        <div style={{ width: sidebarWidth }} className="flex flex-col shrink-0 relative border-r border-vs-border bg-vs-sidebar overflow-hidden">
                            {activeSidebarView === 'explorer' && (
                                <div className="h-full animate-slide-in">
                                     <Explorer fileSystem={fileSystem} activeFileId={activeFileId} onSelectFile={handleSelectFile} onToggleFolder={toggleFolder} onCreateItem={createItem} onDeleteItem={deleteItem} onRenameItem={()=>{}} onMoveItem={()=>{}} />
                                </div>
                            )}
                            <div className="absolute top-0 right-0 w-2 h-full cursor-col-resize hover:bg-vs-accent transition-colors z-20 opacity-0 hover:opacity-100" onMouseDown={startSidebarResizing} />
                        </div>
                    )}

                    {/* Main Editor + Terminal + Preview Area */}
                    <div className="flex-1 flex flex-col min-w-0 bg-vs-bg">
                        {/* Tabs */}
                        <div className="flex h-9 bg-vs-activityBar border-b border-vs-border shrink-0">
                            <div style={{ width: editorWidth }} className="h-full flex overflow-x-auto custom-scrollbar border-r border-vs-border shrink-0 bg-vs-inactive-tab">
                                {openFiles.map(id => {
                                    const file = fileSystem[id];
                                    if (!file) return null;
                                    const isActive = activeFileId === id;
                                    return (
                                        <div key={id} className={`group flex items-center px-3 text-xs border-r border-vs-border cursor-pointer min-w-[120px] max-w-[200px] select-none h-full ${isActive ? 'bg-vs-bg text-vs-text border-t-2 border-t-vs-accent' : 'bg-transparent text-neutral-500 hover:bg-vs-itemHover'}`} onClick={() => setActiveFileId(id)}>
                                            <span className={`mr-2 ${isActive ? 'text-vs-accent' : ''}`}>{file.language === 'html' ? '<>' : '#'}</span>
                                            <span className="truncate flex-1">{file.name}</span>
                                            <button className={`ml-2 p-0.5 rounded-sm hover:bg-neutral-600 ${isActive ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'}`} onClick={(e) => handleCloseFile(e, id)}><X size={12} /></button>
                                        </div>
                                    );
                                })}
                            </div>
                            
                            {/* Browser Bar */}
                            <div className="flex-1 h-full flex items-center px-2 space-x-2 min-w-0 bg-vs-bg select-none border-b border-vs-border">
                                <button onClick={() => setRefreshTrigger(t => t + 1)} title="Reload Frame" className="p-1.5 rounded-sm hover:bg-vs-itemHover text-vs-text opacity-70 hover:opacity-100 transition-colors shrink-0">
                                    <RefreshCw size={14} />
                                </button>
                                <div className="flex-1 flex items-center relative group min-w-0 mt-1 mb-1">
                                    <div className="absolute left-2 top-1/2 -translate-y-1/2 text-vs-text opacity-50 pointer-events-none z-10"><Globe size={12} /></div>
                                    <input type="text" readOnly value={previewUrl || 'Waiting for localhost...'} className="w-full pl-7 pr-7 text-[11px] bg-vs-input-bg border border-vs-border rounded-sm text-vs-text font-mono shadow-sm h-6" />
                                </div>
                            </div>
                        </div>

                        {/* Middle Content Split */}
                        <div className="flex-1 flex overflow-hidden">
                            {/* Editor & Terminal Column */}
                            <div style={{ width: editorWidth }} className="h-full relative border-r border-vs-border flex flex-col">
                                
                                {/* Monaco Editor */}
                                <div className="flex-1 relative min-h-0">
                                    <CodeEditor file={activeFile} settings={settings} theme={currentTheme} onChange={(val) => activeFileId && updateFileContent(activeFileId, val)} />
                                </div>

                                {/* Terminal */}
                                <div className="h-64 shrink-0 bg-vs-sidebar border-t border-vs-border flex flex-col shadow-[0_-5px_15px_rgba(0,0,0,0.3)] z-10">
                                    <div className="h-8 shrink-0 bg-vs-activityBar flex items-center px-4 text-[10px] font-bold tracking-widest uppercase text-neutral-400 border-b border-vs-border shadow-sm">
                                        <TerminalIcon className="w-3.5 h-3.5 mr-2" /> Xterm Console
                                    </div>
                                    <div className="flex-1 relative p-2 bg-[#1e1e1e]">
                                        <div className="absolute inset-0 p-2 overflow-hidden" ref={terminalRef}></div>
                                    </div>
                                </div>

                            </div>
                            
                            <div className="w-2 -ml-1 h-full cursor-col-resize hover:bg-vs-accent transition-colors z-30 bg-transparent hover:opacity-100" onMouseDown={startEditorResizing} />

                            {/* Live Preview Column */}
                            <div ref={previewContainerRef} className={`flex-1 h-full bg-white relative min-w-0`}>
                                <Preview previewUrl={previewUrl} refreshTrigger={refreshTrigger} />
                            </div>
                        </div>
                    </div>
                </div>
                
                {/* Footer */}
                <div className="h-6 bg-vs-accent text-white text-[10px] flex items-center px-4 justify-between select-none shrink-0 transition-colors duration-300">
                     <div className="flex items-center space-x-3">
                         <span className="flex items-center"><div className="w-2 h-2 rounded-full bg-white mr-1 animate-pulse"></div> Local Server OS Linked</span>
                         {activeFile && (<><span className="uppercase">{activeFile.language}</span><span>UTF-8</span></>)}
                     </div>
                     <div className="flex items-center space-x-4">
                         <span>{settings.tabSize} Spaces</span>
                         <span>015x.dev OS</span>
                     </div>
                </div>
            </div>
          );
        };

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<React.StrictMode><App /></React.StrictMode>);
    </script>
</body>
</html>
