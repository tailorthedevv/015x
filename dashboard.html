<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>015x.dev | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans:['Inter', 'sans-serif'],
              mono:['JetBrains Mono', 'monospace'],
            },
            colors: {
              nexus: {
                dark: '#050505',
                panel: '#0a0a0a',
                accent: '#ffffff',
                accentHover: '#d4d4d4',
                secondary: '#333333',
                dim: '#222222',
              }
            }
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@100;400;800&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #000000;
        color: #e5e5e5;
        overflow-x: hidden;
      }
      ::selection {
        background: #ffffff;
        color: #000000;
      }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: #000000; }
      ::-webkit-scrollbar-thumb { background: #333333; }
      ::-webkit-scrollbar-thumb:hover { background: #ffffff; }
    </style>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="importmap">
    {
      "imports": {
        "react-dom/client": "https://esm.sh/react-dom@^19.2.3/client",
        "react": "https://esm.sh/react@^19.2.3",
        "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
        "jszip": "https://esm.sh/jszip@3.10.1"
      }
    }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
      import React, { useState, useEffect, useMemo } from 'react';
      import { createRoot } from 'react-dom/client';
      import { 
        Terminal, Plus, Trash2, HardDrive, 
        Clock, Folder, Play, FileJson, Search, 
        Edit2, Copy, Download, Code2
      } from 'lucide-react';
      import JSZip from 'jszip';

      // --- LOCAL DATABASE (INDEXED_DB VFS) ---
      const DB_NAME = '015X_CORE_FS';
      const STORE_NAME = 'repositories';

      const initDB = () => new Promise((resolve, reject) => {
          const req = indexedDB.open(DB_NAME, 1);
          req.onupgradeneeded = (e) => {
              const db = e.target.result;
              if (!db.objectStoreNames.contains(STORE_NAME)) {
                  db.createObjectStore(STORE_NAME, { keyPath: 'id' });
              }
          };
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
      });

      const VFS = {
          async getRepos() {
              const db = await initDB();
              return new Promise(resolve => {
                  const tx = db.transaction(STORE_NAME, 'readonly');
                  const req = tx.objectStore(STORE_NAME).getAll();
                  req.onsuccess = () => resolve(req.result);
              });
          },
          async saveRepo(repo) {
              const db = await initDB();
              return new Promise(resolve => {
                  const tx = db.transaction(STORE_NAME, 'readwrite');
                  repo.updatedAt = Date.now();
                  tx.objectStore(STORE_NAME).put(repo);
                  tx.oncomplete = () => resolve(repo);
              });
          },
          async deleteRepo(id) {
              const db = await initDB();
              return new Promise(resolve => {
                  const tx = db.transaction(STORE_NAME, 'readwrite');
                  tx.objectStore(STORE_NAME).delete(id);
                  tx.oncomplete = () => resolve();
              });
          },
          async getRepo(id) {
              const db = await initDB();
              return new Promise(resolve => {
                  const tx = db.transaction(STORE_NAME, 'readonly');
                  const req = tx.objectStore(STORE_NAME).get(id);
                  req.onsuccess = () => resolve(req.result);
              });
          }
      };

      // --- UTILS: SFX & CURSOR ---
      let audioCtx = null;
      const initAudio = () => {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return audioCtx;
      };

      const playHoverSfx = () => {
        const ctx = initAudio();
        if (!ctx) return;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.05);
        gain.gain.setValueAtTime(0.02, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.05);
      };

      const playClickSfx = () => {
        const ctx = initAudio();
        if (!ctx) return;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(200, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.03, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.1);
      };

      const CustomCursor = () => {
        const [pos, setPos] = useState({ x: 0, y: 0 });
        useEffect(() => {
          const update = (e) => setPos({ x: e.clientX, y: e.clientY });
          window.addEventListener('mousemove', update);
          return () => window.removeEventListener('mousemove', update);
        },[]);
        return (
          <div className="fixed pointer-events-none z-[100] text-gray-400 font-mono font-bold text-xs mix-blend-difference hidden md:block"
               style={{ left: pos.x, top: pos.y, transform: 'translate(12px, 12px)' }}>
            +
          </div>
        );
      };

      const NavBar = () => (
        <nav className="fixed top-0 left-0 w-full z-50 bg-black/90 backdrop-blur-sm border-b border-white/10">
          <div className="max-w-[1600px] mx-auto px-4 md:px-8">
            <div className="flex items-center justify-between h-16 md:h-20">
              <a href="/" onMouseEnter={playHoverSfx} onClick={playClickSfx} className="flex items-center gap-4 group cursor-pointer no-underline">
                <div className="w-8 h-8 md:w-10 md:h-10 bg-white flex items-center justify-center border border-white transition-all duration-300 group-hover:bg-black group-hover:text-white">
                  <Terminal className="text-black group-hover:text-white w-5 h-5 transition-colors duration-300" />
                </div>
                <div className="flex flex-col">
                  <span className="text-lg md:text-xl font-bold tracking-widest text-white uppercase font-sans leading-none">015X.DEV</span>
                  <span className="text-[10px] font-mono tracking-[0.2em] text-gray-500 uppercase mt-1">Dashboard</span>
                </div>
              </a>
              <div className="flex items-center gap-4 md:gap-6">
                 <div className="hidden sm:flex items-center gap-2">
                    <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <span className="text-[10px] font-mono uppercase tracking-widest text-green-500/80">Storage Active</span>
                 </div>
              </div>
            </div>
          </div>
        </nav>
      );

      // --- MAIN DASHBOARD COMPONENT ---
      const Dashboard = () => {
        const [repos, setRepos] = useState([]);
        const[loading, setLoading] = useState(true);
        const [showModal, setShowModal] = useState(false);
        const [newRepoName, setNewRepoName] = useState('');
        
        // Filters & Sorting
        const[searchQuery, setSearchQuery] = useState('');
        const [sortBy, setSortBy] = useState('updated'); // updated, created, name

        const loadRepos = async () => {
            setLoading(true);
            const data = await VFS.getRepos();
            
            if (data.length === 0) {
                const dummyRepo = {
                    id: 'repo_' + Date.now().toString(36),
                    name: 'My First Project',
                    createdAt: Date.now(),
                    updatedAt: Date.now(),
                    files: {
                        'index.html': { 
                            type: 'file', 
                            content: '<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <title>My First Project</title>\n  <link rel="stylesheet" href="style.css">\n</head>\n<body>\n  <div class="container">\n    <h1>Hello World</h1>\n    <p>Welcome to your new project.</p>\n  </div>\n  <script src="script.js"><\/script>\n</body>\n</html>' 
                        },
                        'style.css': {
                            type: 'file',
                            content: 'body {\n  font-family: system-ui, sans-serif;\n  background: #111;\n  color: #fff;\n  margin: 0;\n  display: flex;\n  justify-content: center;\n  align-items: center;\n  min-height: 100vh;\n}\n.container {\n  text-align: center;\n  padding: 2rem;\n  border: 1px solid #333;\n  border-radius: 8px;\n  background: #000;\n}'
                        },
                        'script.js': {
                            type: 'file',
                            content: 'console.log("Project successfully loaded.");'
                        },
                        'assets': { type: 'dir', children: {} }
                    }
                };
                await VFS.saveRepo(dummyRepo);
                setRepos([dummyRepo]);
            } else {
                setRepos(data);
            }
            setLoading(false);
        };

        useEffect(() => { loadRepos(); },[]);

        const sortedAndFilteredRepos = useMemo(() => {
            let filtered = repos.filter(r => r.name.toLowerCase().includes(searchQuery.toLowerCase()));
            return filtered.sort((a, b) => {
                if (sortBy === 'updated') return b.updatedAt - a.updatedAt;
                if (sortBy === 'created') return b.createdAt - a.createdAt;
                if (sortBy === 'name') return a.name.localeCompare(b.name);
                return 0;
            });
        },[repos, searchQuery, sortBy]);

        const handleCreate = async (e) => {
            e.preventDefault();
            playClickSfx();
            if (!newRepoName.trim()) return;

            const repo = {
                id: 'repo_' + Date.now().toString(36) + Math.random().toString(36).substr(2),
                name: newRepoName.trim(),
                createdAt: Date.now(),
                updatedAt: Date.now(),
                files: {
                    'index.html': { 
                        type: 'file', 
                        content: '<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <title>New Project</title>\n  <link rel="stylesheet" href="style.css">\n</head>\n<body>\n  <h1>Ready to build</h1>\n  <script src="script.js"><\/script>\n</body>\n</html>' 
                    },
                    'style.css': {
                        type: 'file',
                        content: 'body {\n  background: #fff;\n  color: #000;\n  font-family: sans-serif;\n  padding: 2rem;\n}'
                    },
                    'script.js': {
                        type: 'file',
                        content: '// Start writing your JavaScript here\nconsole.log("Started");'
                    }
                }
            };

            await VFS.saveRepo(repo);
            setShowModal(false);
            setNewRepoName('');
            loadRepos();
        };

        const handleDelete = async (id, e) => {
            e.stopPropagation();
            playClickSfx();
            if(confirm("Are you sure you want to permanently delete this project?")) {
                await VFS.deleteRepo(id);
                loadRepos();
            }
        };

        const handleRename = async (repo, e) => {
            e.stopPropagation();
            playClickSfx();
            const newName = prompt("Enter new name for project:", repo.name);
            if (newName && newName.trim() !== '' && newName.trim() !== repo.name) {
                repo.name = newName.trim();
                await VFS.saveRepo(repo);
                loadRepos();
            }
        };

        const handleDuplicate = async (repoId, e) => {
            e.stopPropagation();
            playClickSfx();
            const repoToCopy = await VFS.getRepo(repoId);
            if (!repoToCopy) return;

            const newRepo = {
                ...repoToCopy,
                id: 'repo_' + Date.now().toString(36) + Math.random().toString(36).substr(2),
                name: repoToCopy.name + ' (Copy)',
                createdAt: Date.now(),
                updatedAt: Date.now()
            };

            await VFS.saveRepo(newRepo);
            loadRepos();
        };

        const handleExport = async (repo, e) => {
            e.stopPropagation();
            playClickSfx();
            const zip = new JSZip();
            
            const addFilesToZip = (folder, currentZipFolder) => {
               for (const [key, node] of Object.entries(folder)) {
                   if (node.type === 'dir') {
                       const newZipFolder = currentZipFolder.folder(node.name || key);
                       if (node.children) addFilesToZip(node.children, newZipFolder);
                   } else {
                       currentZipFolder.file(node.name || key, node.content || '');
                   }
               }
            };

            try {
                addFilesToZip(repo.files, zip);
                const content = await zip.generateAsync({ type: 'blob' });
                const url = window.URL.createObjectURL(content);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${repo.name.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.zip`;
                a.click();
                window.URL.revokeObjectURL(url);
            } catch (err) {
                console.error("Export failed:", err);
                alert("Failed to export project.");
            }
        };

        const openProject = (repoId) => {
            playClickSfx();
            window.location.href = `/code-editor.html?repo=${repoId}`;
        };

        const formatDate = (ts) => new Date(ts).toLocaleString('en-US', { 
            month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false 
        });

        return (
          <div className="min-h-screen font-sans selection:bg-white selection:text-black overflow-x-hidden bg-black text-white pt-24 pb-12">
            <CustomCursor />
            <NavBar />

            <main className="max-w-[1600px] mx-auto px-4 md:px-8 space-y-8">
              {/* Header Sector */}
              <div className="flex flex-col md:flex-row items-start md:items-end justify-between border-b border-white/10 pb-6 gap-6">
                <div>
                    <div className="text-[10px] font-mono text-gray-500 uppercase tracking-widest mb-2">
                        Workspace Overview
                    </div>
                    <h1 className="text-4xl md:text-5xl font-bold uppercase tracking-tight text-white leading-none">
                        Projects
                    </h1>
                </div>
                
                <div className="flex flex-col items-start md:items-end gap-4 w-full md:w-auto">
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-8 text-left md:text-right w-full">
                        <div className="flex flex-col gap-1 col-span-2 md:col-span-1">
                            <span className="text-[9px] font-mono text-gray-600 uppercase">Local Storage</span>
                            <span className="text-xs font-mono text-white flex items-center md:justify-end gap-1"><HardDrive className="w-3 h-3"/> IndexedDB</span>
                        </div>
                        <div className="flex flex-col gap-1 col-span-2 md:col-span-1">
                            <span className="text-[9px] font-mono text-gray-600 uppercase">Total Projects</span>
                            <span className="text-xs font-mono text-white">{repos.length}</span>
                        </div>
                        <div className="flex flex-col gap-1 col-span-2 md:col-span-2">
                             <button 
                                onClick={() => { playClickSfx(); setShowModal(true); }}
                                onMouseEnter={playHoverSfx}
                                className="w-full bg-white text-black px-6 py-2.5 text-xs font-bold uppercase tracking-widest hover:bg-transparent hover:text-white border border-transparent hover:border-white transition-all flex items-center justify-center gap-2"
                             >
                                <Plus className="w-4 h-4" /> New Project
                             </button>
                        </div>
                    </div>
                </div>
              </div>

              {/* Toolbar */}
              <div className="flex flex-col sm:flex-row gap-4 items-center justify-between">
                  <div className="relative w-full sm:w-96">
                      <Search className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500" />
                      <input 
                          type="text" 
                          placeholder="Search projects..." 
                          value={searchQuery}
                          onChange={(e) => setSearchQuery(e.target.value)}
                          className="w-full bg-[#0a0a0a] border border-white/20 pl-10 pr-4 py-2 text-sm text-white focus:outline-none focus:border-white transition-colors placeholder:text-gray-600"
                      />
                  </div>
                  <div className="flex items-center gap-3 w-full sm:w-auto">
                      <span className="text-xs text-gray-500 uppercase font-mono tracking-widest hidden sm:block">Sort By</span>
                      <select 
                          value={sortBy} 
                          onChange={(e) => setSortBy(e.target.value)}
                          className="bg-[#0a0a0a] border border-white/20 text-sm text-white px-4 py-2 focus:outline-none focus:border-white w-full sm:w-auto cursor-pointer appearance-none"
                      >
                          <option value="updated">Last Edited</option>
                          <option value="created">Date Created</option>
                          <option value="name">Name (A-Z)</option>
                      </select>
                  </div>
              </div>

              {/* Grid Area */}
              {loading ? (
                  <div className="w-full h-64 border border-white/10 border-dashed flex flex-col items-center justify-center space-y-4">
                      <span className="text-[10px] font-mono uppercase tracking-widest text-gray-500">Loading projects...</span>
                  </div>
              ) : (
                  <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 relative">
                      
                      {sortedAndFilteredRepos.map((repo) => (
                          <div 
                              key={repo.id}
                              onMouseEnter={playHoverSfx}
                              onClick={() => openProject(repo.id)}
                              className="group relative bg-[#050505] p-6 flex flex-col border border-white/10 hover:border-white/40 transition-all duration-300 cursor-pointer min-h-[260px]"
                          >
                              {/* Card Header */}
                              <div className="flex justify-between items-start mb-4">
                                  <div className="flex items-center gap-3">
                                      <div className="w-10 h-10 border border-white/10 flex items-center justify-center bg-black group-hover:bg-white group-hover:text-black transition-colors">
                                          <Code2 className="w-5 h-5" />
                                      </div>
                                      <div className="flex flex-col">
                                          <h3 className="text-lg font-bold truncate max-w-[200px] text-white">{repo.name}</h3>
                                          <span className="text-[10px] font-mono text-gray-500 tracking-widest uppercase">Vanilla Web</span>
                                      </div>
                                  </div>
                              </div>

                              {/* Card Body (File Tree Preview) */}
                              <div className="flex-grow bg-black border border-white/5 p-4 font-mono text-[10px] text-gray-500 overflow-hidden relative group-hover:border-white/10 transition-colors">
                                  <div className="space-y-2 opacity-80 group-hover:opacity-100 transition-opacity">
                                      {Object.entries(repo.files).slice(0, 4).map(([name, node], i) => (
                                          <div key={i} className="flex items-center gap-2">
                                              {node.type === 'dir' ? <Folder className="w-3 h-3 text-blue-400"/> : <FileJson className="w-3 h-3 text-gray-400"/>}
                                              {name}
                                          </div>
                                      ))}
                                      {Object.keys(repo.files).length > 4 && <div className="text-gray-600 pt-1">...</div>}
                                  </div>
                              </div>

                              {/* Card Actions / Footer */}
                              <div className="flex items-center justify-between pt-4 mt-4 border-t border-white/5">
                                  <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                      <button onClick={(e) => handleRename(repo, e)} className="p-2 text-gray-500 hover:text-white transition-colors" title="Rename">
                                          <Edit2 className="w-4 h-4" />
                                      </button>
                                      <button onClick={(e) => handleDuplicate(repo.id, e)} className="p-2 text-gray-500 hover:text-white transition-colors" title="Duplicate">
                                          <Copy className="w-4 h-4" />
                                      </button>
                                      <button onClick={(e) => handleExport(repo, e)} className="p-2 text-gray-500 hover:text-white transition-colors" title="Export to ZIP">
                                          <Download className="w-4 h-4" />
                                      </button>
                                      <button onClick={(e) => handleDelete(repo.id, e)} className="p-2 text-gray-500 hover:text-red-500 transition-colors" title="Delete">
                                          <Trash2 className="w-4 h-4" />
                                      </button>
                                  </div>
                                  <div className="flex flex-col items-end gap-1 group-hover:hidden absolute right-6 bottom-6">
                                      <span className="text-[9px] font-mono text-gray-600 uppercase flex items-center gap-1">Last Edited</span>
                                      <span className="text-[10px] font-mono text-gray-400">{formatDate(repo.updatedAt)}</span>
                                  </div>
                                  <div className="hidden group-hover:flex justify-end relative z-10">
                                      <button 
                                          className="text-[10px] font-bold uppercase tracking-widest flex items-center gap-2 bg-white text-black px-4 py-2 hover:bg-gray-200 transition-colors"
                                      >
                                          Open <Play className="w-3 h-3 fill-current" />
                                      </button>
                                  </div>
                              </div>
                          </div>
                      ))}

                      {/* Create New Card */}
                      <div 
                          onClick={() => setShowModal(true)}
                          onMouseEnter={playHoverSfx}
                          className="group border border-white/10 border-dashed hover:border-white/40 bg-transparent flex flex-col items-center justify-center cursor-pointer min-h-[260px] transition-colors"
                      >
                          <div className="w-12 h-12 rounded-full border border-white/20 flex items-center justify-center group-hover:bg-white group-hover:text-black transition-colors mb-4 text-white">
                              <Plus className="w-6 h-6" />
                          </div>
                          <span className="text-sm font-bold uppercase tracking-widest text-white">Create New Project</span>
                      </div>

                  </div>
              )}
            </main>

            {/* NEW PROJECT MODAL */}
            {showModal && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-black/80 backdrop-blur-sm" onClick={() => setShowModal(false)}></div>
                    <div className="relative w-full max-w-lg bg-[#050505] border border-white/20 p-8 md:p-10 shadow-2xl">
                        <div className="flex items-center gap-3 mb-8 border-b border-white/10 pb-4">
                            <Folder className="w-6 h-6 text-white" />
                            <h2 className="text-xl font-bold uppercase tracking-widest text-white">New Project</h2>
                        </div>
                        
                        <form onSubmit={handleCreate} className="space-y-6">
                            <div className="space-y-2">
                                <label className="text-xs font-mono uppercase tracking-widest text-gray-400">Project Name</label>
                                <input 
                                    autoFocus
                                    type="text" 
                                    value={newRepoName}
                                    onChange={(e) => setNewRepoName(e.target.value)}
                                    className="w-full bg-black border border-white/20 px-4 py-3 text-sm text-white focus:outline-none focus:border-white transition-colors"
                                    placeholder="e.g. My Website"
                                    required
                                />
                            </div>

                            <div className="pt-4 flex gap-4">
                                <button type="button" onClick={() => setShowModal(false)} className="flex-1 border border-white/20 py-3 text-xs font-bold uppercase tracking-widest hover:bg-white/5 transition-colors">
                                    Cancel
                                </button>
                                <button type="submit" className="flex-1 bg-white text-black py-3 text-xs font-bold uppercase tracking-widest hover:bg-gray-200 transition-colors">
                                    Create
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            )}
          </div>
        );
      };

      const root = createRoot(document.getElementById('root'));
      root.render(<Dashboard />);
    </script>
</body>
</html>
