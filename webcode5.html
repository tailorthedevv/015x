<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serverless Web IDE</title>
    
    <!-- Crossorigin required to satisfy WebContainer COEP constraints -->
    <script src="https://cdn.tailwindcss.com" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" crossorigin="anonymous" />
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin="anonymous"></script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "@monaco-editor/react": "https://esm.sh/@monaco-editor/react@4.6.0?deps=react@18.2.0,react-dom@18.2.0",
        "lucide-react": "https://esm.sh/lucide-react@0.330.0?deps=react@18.2.0",
        "@webcontainer/api": "https://esm.sh/@webcontainer/api",
        "xterm": "https://esm.sh/xterm@5.3.0",
        "xterm-addon-fit": "https://esm.sh/xterm-addon-fit@0.8.0"
      }
    }
    </script>

    <script>
        // MAGIC BYPASS: Safely registers SW and forces update to ensure no cached ghosts
        if (typeof window !== 'undefined' && !window.crossOriginIsolated) {
            navigator.serviceWorker.register('./sw.js', { scope: './' }).then(reg => {
                reg.update(); // Force SW update
                if (reg.active && !navigator.serviceWorker.controller) {
                    window.location.reload();
                }
            });
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                window.location.reload();
            });
        }
    </script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #09090b; }
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #18181b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 5px; border: 2px solid #18181b; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
        .xterm .xterm-viewport { overflow-y: auto !important; }
    </style>
</head>
<body>
    <div id="root" class="h-screen w-screen"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import Editor from '@monaco-editor/react';
        import { WebContainer } from '@webcontainer/api';
        import { Terminal } from 'xterm';
        import { FitAddon } from 'xterm-addon-fit';
        import { RotateCcw, Terminal as TerminalIcon, Globe, FileJson, FileCode2, Loader2, LayoutTemplate } from 'lucide-react';

        // --- VIRTUAL HARD DRIVE ---
        const INITIAL_FILES = {
            'package.json': {
                file: {
                    contents: JSON.stringify({
                        name: "browser-express",
                        type: "module",
                        scripts: { start: "node --watch index.js" },
                        dependencies: { express: "^4.18.2" }
                    }, null, 2)
                }
            },
            'index.js': {
                file: {
                    contents: `import express from 'express';\n\nconst app = express();\nconst port = 3111;\n\napp.get('/', (req, res) => {\n  res.send(\`\n    <div style="font-family: system-ui, sans-serif; text-align: center; padding: 10vh 20px;">\n      <h1 style="color: #6366f1; font-size: 3rem; margin-bottom: 10px;">Server is Live! 🚀</h1>\n      <p style="color: #4b5563; font-size: 1.2rem;">This Express API is running entirely inside your browser tab.</p>\n      <div style="margin-top: 30px; display: inline-block; padding: 15px 25px; background: #f3f4f6; border-radius: 10px;">\n        <p style="margin: 0; color: #1f2937;">Edit <b>index.js</b> and watch it auto-restart instantly!</p>\n      </div>\n    </div>\n  \`);\n});\n\napp.listen(port, () => {\n  console.log(\`Server running locally on port \${port}\`);\n});\n`
                }
            }
        };

        const App = () => {
            const [wc, setWc] = useState(null);
            const [isBooting, setIsBooting] = useState(true);
            const [serverReady, setServerReady] = useState(false);
            const [files, setFiles] = useState(INITIAL_FILES);
            const [activeFile, setActiveFile] = useState('index.js');
            const [previewUrl, setPreviewUrl] = useState('');
            
            const terminalRef = useRef(null);
            const writeTimer = useRef(null);

            useEffect(() => {
                if (!window.crossOriginIsolated) return;
                let mounted = true;

                async function bootOS() {
                    try {
                        // Prevent double-booting race conditions
                        if (!window.__wcPromise) {
                            window.__wcPromise = WebContainer.boot();
                        }
                        const container = await window.__wcPromise;
                        if (!mounted) return;

                        setWc(container);
                        await container.mount(files);
                        
                        container.on('server-ready', (port, url) => {
                            setPreviewUrl(url);
                            setServerReady(true);
                        });

                        setIsBooting(false);
                        startShell(container);
                    } catch (error) {
                        console.error("Failed to boot OS", error);
                    }
                }
                bootOS();

                return () => { mounted = false; };
            }, []);

            const startShell = async (container) => {
                if (!terminalRef.current || window.__shellStarted) return;
                window.__shellStarted = true;

                const term = new Terminal({
                    convertEol: true, 
                    theme: { 
                        background: '#18181b', // zinc-900
                        foreground: '#d4d4d8', // zinc-300
                        cursor: '#ffffff'
                    },
                    fontFamily: 'Menlo, Monaco, "Courier New", monospace', 
                    fontSize: 13
                });
                const fitAddon = new FitAddon();
                term.loadAddon(fitAddon);
                term.open(terminalRef.current);
                
                setTimeout(() => fitAddon.fit(), 100);
                window.addEventListener('resize', () => fitAddon.fit());

                term.writeln('\x1b[1;38;2;59;130;246m►\x1b[0m \x1b[1mWebContainer OS Booted.\x1b[0m');
                term.writeln('\x1b[1;38;2;16;185;129m►\x1b[0m \x1b[1mNode.js Sandbox Ready.\x1b[0m\n');

                const shellProcess = await container.spawn('jsh', {
                    terminal: { cols: term.cols, rows: term.rows }
                });

                shellProcess.output.pipeTo(new WritableStream({ write(data) { term.write(data); } }));
                const input = shellProcess.input.getWriter();
                term.onData((data) => input.write(data));

                await input.write('npm install && npm start\r');
            };

            const handleEditorChange = (value) => {
                setFiles(prev => ({
                    ...prev,
                    [activeFile]: { file: { contents: value } }
                }));

                // Debounce disk writes to prevent overloading WebContainers CPU
                if (wc) {
                    clearTimeout(writeTimer.current);
                    writeTimer.current = setTimeout(async () => {
                        try {
                            await wc.fs.writeFile(`/${activeFile}`, value);
                        } catch(err) {
                            console.error("Write error:", err);
                        }
                    }, 500); 
                }
            };

            if (!window.crossOriginIsolated) {
                return (
                    <div className="h-screen w-screen bg-zinc-950 flex flex-col items-center justify-center text-zinc-100">
                        <Loader2 className="w-12 h-12 animate-spin text-blue-500 mb-6" />
                        <h2 className="text-3xl font-bold mb-3 tracking-tight">Initializing OS Sandbox</h2>
                        <p className="text-zinc-400 max-w-md text-center">
                            Injecting security policies. The page will auto-reload securely in a moment...
                        </p>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-screen bg-zinc-950 text-zinc-300 font-sans overflow-hidden">
                    {/* Top Navbar */}
                    <div className="h-12 bg-zinc-900 border-b border-zinc-800 flex items-center px-4 shrink-0 justify-between shadow-sm z-10">
                        <div className="flex items-center">
                            <div className="bg-gradient-to-br from-blue-600 to-indigo-600 p-1.5 rounded-md mr-3 shadow-lg">
                                <LayoutTemplate className="w-4 h-4 text-white" />
                            </div>
                            <span className="font-semibold text-zinc-100 tracking-wide text-sm">Serverless IDE Engine</span>
                            <span className="ml-3 px-2 py-0.5 rounded bg-zinc-800 text-[10px] text-zinc-400 uppercase font-bold tracking-wider border border-zinc-700">Client-Side OS</span>
                        </div>
                        <div className="flex items-center text-xs font-medium pr-2">
                            {isBooting ? (
                                <span className="flex items-center text-amber-400"><Loader2 className="w-3.5 h-3.5 mr-2 animate-spin" /> Booting WASM Engine...</span>
                            ) : serverReady ? (
                                <span className="flex items-center text-emerald-400"><div className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse mr-2"></div> Live on Port 3111</span>
                            ) : (
                                <span className="flex items-center text-blue-400"><Loader2 className="w-3.5 h-3.5 mr-2 animate-spin" /> Starting Server...</span>
                            )}
                        </div>
                    </div>

                    <div className="flex flex-1 overflow-hidden">
                        {/* Left Sidebar: Explorer */}
                        <div className="w-60 bg-zinc-900 border-r border-zinc-800 flex flex-col py-3 shrink-0">
                            <span className="text-[11px] font-bold text-zinc-500 uppercase px-5 mb-3 tracking-wider">Explorer</span>
                            <div className="flex flex-col space-y-0.5 w-full">
                                {Object.keys(files).map(name => (
                                    <button key={name} onClick={() => setActiveFile(name)}
                                        className={`flex items-center w-full px-5 py-2 text-sm transition-all duration-200 border-l-2 ${
                                            activeFile === name 
                                            ? 'border-blue-500 bg-zinc-800/50 text-blue-100' 
                                            : 'border-transparent text-zinc-400 hover:bg-zinc-800/30 hover:text-zinc-200'
                                        }`}>
                                        {name.endsWith('.js') ? <FileCode2 className="w-4 h-4 mr-3 text-amber-500/80"/> : <FileJson className="w-4 h-4 mr-3 text-emerald-500/80"/>}
                                        {name}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Center Column: Editor + Terminal */}
                        <div className="flex-1 flex flex-col min-w-0 shadow-2xl z-0">
                            {/* Editor */}
                            <div className="flex-1 flex flex-col min-h-0 bg-[#1e1e1e]">
                                <div className="h-10 bg-zinc-900 flex items-center px-4 text-sm font-mono border-b border-zinc-800 text-zinc-300">
                                    <div className="flex items-center px-4 py-1.5 bg-zinc-800/80 rounded-t-md border-b-2 border-blue-500 text-zinc-100 mt-2 text-xs">
                                        {activeFile.endsWith('.js') ? <FileCode2 className="w-3.5 h-3.5 mr-2 text-amber-500/80"/> : <FileJson className="w-3.5 h-3.5 mr-2 text-emerald-500/80"/>}
                                        {activeFile}
                                    </div>
                                </div>
                                <div className="flex-1 relative">
                                    <Editor height="100%" theme="vs-dark"
                                        language={activeFile.endsWith('.js') ? 'javascript' : 'json'}
                                        value={files[activeFile].file.contents}
                                        onChange={handleEditorChange}
                                        options={{ minimap: { enabled: false }, fontSize: 14, padding: { top: 16 } }}
                                    />
                                </div>
                            </div>

                            {/* Terminal */}
                            <div className="h-[280px] flex flex-col bg-zinc-900 border-t border-zinc-800 shrink-0">
                                <div className="h-9 bg-zinc-900 flex items-center px-4 text-[11px] font-bold uppercase tracking-wider text-zinc-500 border-b border-zinc-800 shrink-0">
                                    <TerminalIcon className="w-3.5 h-3.5 mr-2 text-zinc-500" /> Embedded Terminal
                                </div>
                                <div className="flex-1 p-3 overflow-hidden bg-zinc-900" ref={terminalRef}></div>
                            </div>
                        </div>

                        {/* Right Sidebar: Browser Preview */}
                        <div className="w-1/3 min-w-[350px] max-w-[500px] flex flex-col bg-white shrink-0 shadow-xl z-10 border-l border-zinc-800">
                            <div className="h-12 bg-zinc-100 flex items-center px-3 space-x-2 shrink-0 border-b border-zinc-200">
                                <div className="flex space-x-1.5 mr-2">
                                    <div className="w-3 h-3 rounded-full bg-red-400 border border-red-500/20"></div>
                                    <div className="w-3 h-3 rounded-full bg-amber-400 border border-amber-500/20"></div>
                                    <div className="w-3 h-3 rounded-full bg-green-400 border border-green-500/20"></div>
                                </div>
                                <button onClick={() => {
                                    const iframe = document.getElementById('preview');
                                    if (iframe) iframe.src = iframe.src;
                                }} className="p-1.5 text-zinc-500 hover:bg-zinc-200 hover:text-zinc-700 rounded-md transition-colors">
                                    <RotateCcw className="w-3.5 h-3.5" />
                                </button>
                                <div className="flex-1 bg-white border border-zinc-200 rounded-md px-3 py-1.5 text-[11px] text-zinc-600 font-mono truncate flex items-center shadow-sm">
                                    <Globe className="w-3 h-3 mr-2 text-zinc-400"/> 
                                    {previewUrl || 'Waiting for connection...'}
                                </div>
                            </div>
                            <div className="flex-1 relative bg-zinc-50">
                                {!previewUrl ? (
                                    <div className="absolute inset-0 flex flex-col items-center justify-center text-zinc-400">
                                        <Loader2 className="w-8 h-8 animate-spin mb-4 text-blue-500" /> 
                                        <p className="font-medium text-zinc-600">Awaiting Server Port...</p>
                                        <p className="text-xs mt-2 text-center px-8 text-zinc-500">The iframe will map to your localhost URL automatically.</p>
                                    </div>
                                ) : <iframe id="preview" src={previewUrl} className="w-full h-full border-none bg-white" allow="cross-origin-isolated" />}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
