<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serverless Node.js IDE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Map our pure ESM browser dependencies -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "@monaco-editor/react": "https://esm.sh/@monaco-editor/react@4.6.0?deps=react@18.2.0,react-dom@18.2.0",
        "lucide-react": "https://esm.sh/lucide-react@0.330.0?deps=react@18.2.0",
        "@webcontainer/api": "https://esm.sh/@webcontainer/api@1.1.10",
        "xterm": "https://esm.sh/xterm@5.3.0",
        "xterm-addon-fit": "https://esm.sh/xterm-addon-fit@0.8.0"
      }
    }
    </script>

    <script>
        // MAGIC BYPASS: Register the Service Worker to force GitHub Pages to allow WebAssembly Multi-threading
        if (typeof window !== 'undefined' && !window.crossOriginIsolated) {
            navigator.serviceWorker.register('./sw.js').then(reg => {
                reg.addEventListener("updatefound", () => window.location.reload());
                if (reg.active && !navigator.serviceWorker.controller) window.location.reload();
            });
        }
    </script>

    <style>
        body { background-color: #1e1e1e; color: #d4d4d4; margin: 0; overflow: hidden; font-family: sans-serif; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #424242; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4f4f4f; }
        .xterm { padding: 12px; height: 100%; width: 100%; }
    </style>
</head>
<body>
    <div id="root" class="h-screen w-screen"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import Editor from '@monaco-editor/react';
        import { WebContainer } from '@webcontainer/api';
        import { Terminal } from 'xterm';
        import { FitAddon } from 'xterm-addon-fit';
        import { RotateCcw, Terminal as TerminalIcon, Globe, FileJson, FileCode2, Loader2 } from 'lucide-react';

        // --- VIRTUAL HARD DRIVE ---
        const INITIAL_FILES = {
            'package.json': {
                file: {
                    contents: JSON.stringify({
                        name: "browser-express",
                        type: "module",
                        scripts: { start: "nodemon index.js" },
                        dependencies: { express: "^4.18.2", nodemon: "^3.0.1" }
                    }, null, 2)
                }
            },
            'index.js': {
                file: {
                    contents: `import express from 'express';\n\nconst app = express();\nconst port = 3111;\n\napp.get('/', (req, res) => {\n  res.send(\`\n    <div style="font-family: system-ui; text-align: center; padding: 50px;">\n      <h1 style="color: #4f46e5;">Server is Live! 🚀</h1>\n      <p>This Express API is running entirely inside your browser tab.</p>\n      <p>Edit <b>index.js</b> and Nodemon will auto-restart!</p>\n    </div>\n  \`);\n});\n\napp.listen(port, () => {\n  console.log(\`Server running locally on port \${port}\`);\n});\n`
                }
            }
        };

        const App = () => {
            const [wc, setWc] = useState(null);
            const [isBooting, setIsBooting] = useState(true);
            const [files, setFiles] = useState(INITIAL_FILES);
            const [activeFile, setActiveFile] = useState('index.js');
            const [previewUrl, setPreviewUrl] = useState('');
            
            const terminalRef = useRef(null);

            useEffect(() => {
                // Wait for the Service Worker to reload the page with correct headers
                if (!window.crossOriginIsolated) return;

                async function bootOS() {
                    console.log("Booting OS...");
                    const container = await WebContainer.boot();
                    setWc(container);
                    await container.mount(files);
                    
                    container.on('server-ready', (port, url) => {
                        setPreviewUrl(url);
                    });

                    setIsBooting(false);
                    startShell(container);
                }
                bootOS();
            }, []);

            const startShell = async (container) => {
                if (!terminalRef.current) return;

                // Setup Terminal UI
                const term = new Terminal({
                    convertEol: true, theme: { background: '#1e1e1e' },
                    fontFamily: '"Fira Code", monospace', fontSize: 13
                });
                const fitAddon = new FitAddon();
                term.loadAddon(fitAddon);
                term.open(terminalRef.current);
                fitAddon.fit();
                window.addEventListener('resize', () => fitAddon.fit());

                term.writeln('\x1b[1;32m[OS] WebAssembly Node.js Booted Successfully.\x1b[0m');

                // Spawn bash shell
                const shellProcess = await container.spawn('jsh', {
                    terminal: { cols: term.cols, rows: term.rows }
                });

                // Pipe streams
                shellProcess.output.pipeTo(new WritableStream({ write(data) { term.write(data); } }));
                const input = shellProcess.input.getWriter();
                term.onData((data) => input.write(data));

                // Auto install and run server
                term.writeln('\x1b[1;33m[OS] Fetching NPM packages...\x1b[0m');
                await input.write('npm install && npm start\r');
            };

            const handleEditorChange = async (value) => {
                const updatedFiles = { ...files };
                updatedFiles[activeFile].file.contents = value;
                setFiles(updatedFiles);

                // Write file to the virtual hard drive (Triggers Nodemon)
                if (wc) await wc.fs.writeFile(`/${activeFile}`, value);
            };

            if (!window.crossOriginIsolated) {
                return (
                    <div className="h-screen w-screen flex flex-col items-center justify-center">
                        <Loader2 className="w-10 h-10 animate-spin text-blue-500 mb-4" />
                        <h2 className="text-xl font-bold">Injecting Security Headers...</h2>
                        <p className="text-gray-400 mt-2">Page will automatically reload in a moment.</p>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-screen">
                    <div className="h-12 bg-[#252526] border-b border-[#3c3c3c] flex items-center px-4">
                        <div className="w-3 h-3 bg-green-500 rounded-full animate-pulse mr-3"></div>
                        <span className="font-bold">WebContainer / GitHub Pages</span>
                    </div>

                    <div className="flex flex-1 overflow-hidden">
                        {/* File Explorer */}
                        <div className="w-48 bg-[#252526] border-r border-[#3c3c3c] flex flex-col pt-4">
                            <span className="text-xs font-bold text-gray-500 uppercase px-4 mb-2">Explorer</span>
                            {Object.keys(files).map(name => (
                                <button key={name} onClick={() => setActiveFile(name)}
                                    className={`flex items-center px-4 py-2 text-sm \${activeFile === name ? 'bg-[#37373d] text-white' : 'text-gray-400 hover:text-white'}`}>
                                    {name.endsWith('.js') ? <FileCode2 className="w-4 h-4 mr-2 text-yellow-400"/> : <FileJson className="w-4 h-4 mr-2 text-green-400"/>}
                                    {name}
                                </button>
                            ))}
                        </div>

                        {/* Monaco Editor */}
                        <div className="flex-1 border-r border-[#3c3c3c] flex flex-col">
                            <div className="h-9 bg-[#1e1e1e] flex items-center px-4 text-sm font-mono border-b border-[#3c3c3c]">{activeFile}</div>
                            <div className="flex-1">
                                <Editor height="100%" theme="vs-dark"
                                    language={activeFile.endsWith('.js') ? 'javascript' : 'json'}
                                    value={files[activeFile].file.contents}
                                    onChange={handleEditorChange}
                                    options={{ minimap: { enabled: false }, fontSize: 14 }}
                                />
                            </div>
                        </div>

                        {/* Browser & Terminal */}
                        <div className="flex-1 flex flex-col min-w-[400px]">
                            {/* Browser iframe */}
                            <div className="flex-1 flex flex-col bg-white">
                                <div className="h-9 bg-[#252526] flex items-center px-2 space-x-2">
                                    <button onClick={() => document.getElementById('preview').src += ''} className="text-gray-400 hover:text-white"><RotateCcw className="w-4 h-4" /></button>
                                    <div className="flex-1 bg-[#3c3c3c] rounded px-3 py-1 text-xs text-gray-300 font-mono truncate">
                                        <Globe className="inline w-3 h-3 mr-2"/> {previewUrl || 'Waiting for localhost...'}
                                    </div>
                                </div>
                                <div className="flex-1 relative bg-white">
                                    {!previewUrl ? (
                                        <div className="absolute inset-0 flex flex-col items-center justify-center text-gray-400">
                                            <Loader2 className="w-8 h-8 animate-spin mb-4" /> Waiting for Server...
                                        </div>
                                    ) : <iframe id="preview" src={previewUrl} className="w-full h-full border-none" allow="cross-origin-isolated" />}
                                </div>
                            </div>

                            {/* Terminal */}
                            <div className="h-64 flex flex-col bg-[#1e1e1e] border-t border-[#3c3c3c]">
                                <div className="h-8 bg-[#252526] flex items-center px-4 text-xs font-bold uppercase text-gray-400 border-b border-[#3c3c3c]">
                                    <TerminalIcon className="w-3 h-3 mr-2" /> Terminal
                                </div>
                                <div className="flex-1 overflow-hidden" ref={terminalRef}></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
