<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serverless Client OS</title>
    
    <!-- Loaded with CORS mode so the ServiceWorker can inject headers -->
    <script src="https://cdn.tailwindcss.com" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" crossorigin="anonymous" />
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin="anonymous"></script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "@monaco-editor/react": "https://esm.sh/@monaco-editor/react@4.6.0?deps=react@18.2.0,react-dom@18.2.0",
        "lucide-react": "https://esm.sh/lucide-react@0.330.0?deps=react@18.2.0",
        "@webcontainer/api": "https://esm.sh/@webcontainer/api",
        "xterm": "https://esm.sh/xterm@5.3.0",
        "xterm-addon-fit": "https://esm.sh/xterm-addon-fit@0.8.0"
      }
    }
    </script>

    <script>
        // SW Bootstrapper
        if (typeof window !== 'undefined' && !window.crossOriginIsolated) {
            navigator.serviceWorker.register('./sw.js', { scope: './' }).then(reg => {
                reg.update();
                if (reg.active && !navigator.serviceWorker.controller) {
                    window.location.reload();
                }
            });
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                window.location.reload();
            });
        }
    </script>

    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #09090b; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #18181b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
        .xterm-viewport { overflow-y: auto !important; }
    </style>
</head>
<body>
    <div id="root" class="h-screen w-screen overflow-hidden flex flex-col"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import Editor from '@monaco-editor/react';
        import { WebContainer } from '@webcontainer/api';
        import { Terminal } from 'xterm';
        import { FitAddon } from 'xterm-addon-fit';
        import { RotateCcw, Terminal as TerminalIcon, Globe, FileJson, FileCode2, Loader2, Cpu } from 'lucide-react';

        const INITIAL_FILES = {
            'package.json': {
                file: {
                    contents: JSON.stringify({
                        name: "browser-os-app",
                        type: "module",
                        scripts: { start: "node --watch index.js" },
                        dependencies: { express: "^4.18.2" }
                    }, null, 2)
                }
            },
            'index.js': {
                file: {
                    contents: `import express from 'express';\n\nconst app = express();\nconst port = 3111;\n\napp.get('/', (req, res) => {\n  res.send(\`\n    <div style="font-family: system-ui; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #fafafa;">\n      <h1 style="color: #6366f1; font-size: 3rem; margin: 0 0 10px 0;">⚡ Server is Live!</h1>\n      <p style="color: #4b5563; font-size: 1.2rem;">Running completely inside your browser via WebContainers.</p>\n      <div style="margin-top: 20px; padding: 15px 25px; background: #e0e7ff; border-radius: 8px; border: 1px solid #c7d2fe;">\n        <p style="margin: 0; color: #3730a3; font-weight: 500;">Edit <b>index.js</b> and watch it auto-restart instantly!</p>\n      </div>\n    </div>\n  \`);\n});\n\napp.listen(port, () => {\n  console.log(\`Server running locally on port \${port}\`);\n});\n`
                }
            }
        };

        const App = () => {
            const [wc, setWc] = useState(null);
            const [isBooting, setIsBooting] = useState(true);
            const [serverReady, setServerReady] = useState(false);
            const [files, setFiles] = useState(INITIAL_FILES);
            const [activeFile, setActiveFile] = useState('index.js');
            const [previewUrl, setPreviewUrl] = useState('');
            
            const terminalRef = useRef(null);
            const writeTimer = useRef(null);

            useEffect(() => {
                if (!window.crossOriginIsolated) return;
                let mounted = true;

                async function bootOS() {
                    try {
                        if (!window.__wcPromise) {
                            window.__wcPromise = WebContainer.boot();
                        }
                        const container = await window.__wcPromise;
                        if (!mounted) return;

                        setWc(container);
                        await container.mount(files);
                        
                        container.on('server-ready', (port, url) => {
                            setPreviewUrl(url);
                            setServerReady(true);
                        });

                        setIsBooting(false);
                        startShell(container);
                    } catch (error) {
                        console.error("OS Boot Error:", error);
                    }
                }
                bootOS();

                return () => { mounted = false; };
            }, []);

            const startShell = async (container) => {
                if (!terminalRef.current || window.__shellStarted) return;
                window.__shellStarted = true;

                const term = new Terminal({
                    convertEol: true, 
                    theme: { background: '#18181b', foreground: '#d4d4d8' },
                    fontFamily: 'Consolas, "Courier New", monospace', 
                    fontSize: 13
                });
                
                const fitAddon = new FitAddon();
                term.loadAddon(fitAddon);
                term.open(terminalRef.current);
                
                // Allow DOM to layout first before fitting
                requestAnimationFrame(() => fitAddon.fit());
                window.addEventListener('resize', () => fitAddon.fit());

                term.writeln('\x1b[1;38;2;59;130;246m[SYSTEM]\x1b[0m \x1b[1mWebAssembly Engine Initialized.\x1b[0m');

                const shellProcess = await container.spawn('jsh', {
                    terminal: { cols: term.cols, rows: term.rows }
                });

                shellProcess.output.pipeTo(new WritableStream({ write(data) { term.write(data); } }));
                const input = shellProcess.input.getWriter();
                term.onData((data) => input.write(data));

                // Auto install and start the server
                await input.write('npm install && npm start\r');
            };

            const handleEditorChange = (value) => {
                if (value === undefined) return;
                
                setFiles(prev => ({
                    ...prev,
                    [activeFile]: { file: { contents: value } }
                }));

                if (wc) {
                    clearTimeout(writeTimer.current);
                    writeTimer.current = setTimeout(async () => {
                        try { await wc.fs.writeFile(`/${activeFile}`, value); } 
                        catch(err) { console.error(err); }
                    }, 400); 
                }
            };

            if (!window.crossOriginIsolated) {
                return (
                    <div className="h-full w-full flex flex-col items-center justify-center bg-zinc-950 text-zinc-200">
                        <Loader2 className="w-12 h-12 animate-spin text-indigo-500 mb-6" />
                        <h2 className="text-3xl font-bold tracking-tight">Initializing Environment</h2>
                        <p className="text-zinc-500 mt-2">Connecting to secure sandbox...</p>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-full w-full bg-zinc-950 text-zinc-300">
                    {/* Header */}
                    <div className="h-12 flex-shrink-0 bg-zinc-900 border-b border-zinc-800 flex items-center px-4 justify-between z-10">
                        <div className="flex items-center">
                            <Cpu className="w-5 h-5 text-indigo-500 mr-2" />
                            <span className="font-semibold text-zinc-100 text-sm tracking-wide">ClientOS IDE</span>
                        </div>
                        <div className="text-xs font-medium">
                            {isBooting ? (
                                <span className="flex items-center text-amber-400"><Loader2 className="w-3.5 h-3.5 mr-2 animate-spin" /> Booting Core...</span>
                            ) : serverReady ? (
                                <span className="flex items-center text-emerald-400"><div className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse mr-2"></div> Port 3111 Open</span>
                            ) : (
                                <span className="flex items-center text-blue-400"><Loader2 className="w-3.5 h-3.5 mr-2 animate-spin" /> Starting Server...</span>
                            )}
                        </div>
                    </div>

                    {/* Main Workspace */}
                    <div className="flex-1 flex min-h-0 overflow-hidden">
                        
                        {/* Sidebar */}
                        <div className="w-56 flex-shrink-0 bg-zinc-900 border-r border-zinc-800 flex flex-col py-2">
                            <span className="text-[10px] font-bold text-zinc-500 uppercase px-4 mb-2 tracking-widest">Explorer</span>
                            {Object.keys(files).map(name => (
                                <button key={name} onClick={() => setActiveFile(name)}
                                    className={`flex items-center w-full px-4 py-2 text-sm transition-colors border-l-2 ${
                                        activeFile === name 
                                        ? 'border-indigo-500 bg-zinc-800/80 text-zinc-100' 
                                        : 'border-transparent text-zinc-400 hover:bg-zinc-800/40 hover:text-zinc-200'
                                    }`}>
                                    {name.endsWith('.js') ? <FileCode2 className="w-4 h-4 mr-2 text-yellow-500"/> : <FileJson className="w-4 h-4 mr-2 text-green-500"/>}
                                    {name}
                                </button>
                            ))}
                        </div>

                        {/* Editor + Terminal */}
                        <div className="flex-1 flex flex-col min-w-0">
                            {/* Editor Area */}
                            <div className="flex-1 flex flex-col min-h-0 bg-[#1e1e1e]">
                                <div className="h-10 flex-shrink-0 bg-zinc-900 flex items-end px-2 border-b border-zinc-800">
                                    <div className="flex items-center px-4 py-2 bg-[#1e1e1e] border-t-2 border-indigo-500 text-zinc-100 text-xs rounded-t-sm shadow-sm">
                                        {activeFile.endsWith('.js') ? <FileCode2 className="w-3.5 h-3.5 mr-2 text-yellow-500"/> : <FileJson className="w-3.5 h-3.5 mr-2 text-green-500"/>}
                                        {activeFile}
                                    </div>
                                </div>
                                
                                {/* Absolute positioning ensures Monaco never breaks Flexbox layout */}
                                <div className="flex-1 relative">
                                    <div className="absolute inset-0">
                                        <Editor 
                                            theme="vs-dark"
                                            language={activeFile.endsWith('.js') ? 'javascript' : 'json'}
                                            value={files[activeFile].file.contents}
                                            onChange={handleEditorChange}
                                            options={{ minimap: { enabled: false }, fontSize: 14, padding: { top: 16 } }}
                                        />
                                    </div>
                                </div>
                            </div>

                            {/* Terminal Area */}
                            <div className="h-64 flex-shrink-0 flex flex-col bg-zinc-900 border-t border-zinc-800">
                                <div className="h-8 flex-shrink-0 bg-zinc-900 flex items-center px-4 text-[10px] font-bold uppercase tracking-widest text-zinc-500 border-b border-zinc-800">
                                    <TerminalIcon className="w-3 h-3 mr-2" /> Terminal
                                </div>
                                <div className="flex-1 relative p-2">
                                    <div className="absolute inset-0 p-2 overflow-hidden" ref={terminalRef}></div>
                                </div>
                            </div>
                        </div>

                        {/* Browser Preview Area */}
                        <div className="w-[450px] flex-shrink-0 bg-zinc-50 flex flex-col border-l border-zinc-800 z-10 shadow-2xl">
                            <div className="h-12 flex-shrink-0 bg-zinc-200 border-b border-zinc-300 flex items-center px-3 space-x-2">
                                <div className="flex space-x-1.5 mr-1">
                                    <div className="w-3 h-3 rounded-full bg-red-400"></div>
                                    <div className="w-3 h-3 rounded-full bg-amber-400"></div>
                                    <div className="w-3 h-3 rounded-full bg-green-400"></div>
                                </div>
                                <button onClick={() => {
                                    const iframe = document.getElementById('preview');
                                    if (iframe) iframe.src = iframe.src;
                                }} className="p-1.5 text-zinc-600 hover:bg-zinc-300 rounded transition-colors">
                                    <RotateCcw className="w-3.5 h-3.5" />
                                </button>
                                <div className="flex-1 bg-white border border-zinc-300 rounded px-3 py-1.5 text-[11px] text-zinc-600 font-mono truncate flex items-center shadow-sm">
                                    <Globe className="w-3 h-3 mr-2 text-zinc-400"/> 
                                    {previewUrl || 'Waiting for localhost...'}
                                </div>
                            </div>
                            
                            <div className="flex-1 relative bg-white">
                                {!previewUrl ? (
                                    <div className="absolute inset-0 flex flex-col items-center justify-center text-zinc-400">
                                        <Loader2 className="w-8 h-8 animate-spin mb-4 text-indigo-500" /> 
                                        <p className="font-medium text-zinc-600 text-sm">Waiting for Server...</p>
                                    </div>
                                ) : (
                                    <iframe id="preview" src={previewUrl} className="absolute inset-0 w-full h-full border-none" allow="cross-origin-isolated" />
                                )}
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
