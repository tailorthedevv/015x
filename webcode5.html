<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serverless VS Code OS</title>
    
    <!-- Silences the annoying favicon 404 error -->
    <link rel="icon" href="data:,">

    <!-- No CORS attributes needed thanks to the new Service Worker -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "@monaco-editor/react": "https://esm.sh/@monaco-editor/react@4.6.0?deps=react@18.2.0,react-dom@18.2.0",
        "lucide-react": "https://esm.sh/lucide-react@0.330.0?deps=react@18.2.0",
        "@webcontainer/api": "https://esm.sh/@webcontainer/api",
        "xterm": "https://esm.sh/xterm@5.3.0",
        "xterm-addon-fit": "https://esm.sh/xterm-addon-fit@0.8.0"
      }
    }
    </script>

    <script>
        // Safely registers SW and forces reload once sandbox policies are active
        if (typeof window !== 'undefined' && window.crossOriginIsolated === false) {
            navigator.serviceWorker.register('./sw.js').then(reg => {
                reg.update();
                if (reg.active && !navigator.serviceWorker.controller) window.location.reload();
            });
            navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload());
        }
    </script>

    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0d1117; color: #c9d1d9; }
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #0d1117; border-left: 1px solid #30363d; }
        ::-webkit-scrollbar-thumb { background: #21262d; border: 2px solid #0d1117; border-radius: 6px; }
        ::-webkit-scrollbar-thumb:hover { background: #30363d; }
        .xterm-viewport { overflow-y: auto !important; }
    </style>
</head>
<body>
    <div id="root" class="h-screen w-screen overflow-hidden flex flex-col"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import Editor from '@monaco-editor/react';
        import { WebContainer } from '@webcontainer/api';
        import { Terminal } from 'xterm';
        import { FitAddon } from 'xterm-addon-fit';
        import { RotateCcw, Terminal as TerminalIcon, Globe, FileJson, FileCode2, Loader2, Cpu } from 'lucide-react';

        const INITIAL_FILES = {
            'package.json': {
                file: {
                    contents: JSON.stringify({
                        name: "browser-os",
                        type: "module",
                        scripts: { start: "node --watch index.js" },
                        dependencies: { express: "^4.18.2" }
                    }, null, 2)
                }
            },
            'index.js': {
                file: {
                    contents: `import express from 'express';\n\nconst app = express();\nconst port = 3111;\n\napp.get('/', (req, res) => {\n  res.send(\`\n    <div style="font-family: system-ui; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #0d1117;">\n      <h1 style="color: #58a6ff; font-size: 3rem; margin: 0 0 10px 0;">🚀 Live Server</h1>\n      <p style="color: #8b949e; font-size: 1.2rem;">Running entirely in the browser WebContainer.</p>\n      <div style="margin-top: 20px; padding: 15px 25px; background: #161b22; border-radius: 8px; border: 1px solid #30363d;">\n        <p style="margin: 0; color: #c9d1d9;">Edit <b>index.js</b> and watch it auto-restart instantly!</p>\n      </div>\n    </div>\n  \`);\n});\n\napp.listen(port, () => {\n  console.log(\`Server running locally on port \${port}\`);\n});\n`
                }
            }
        };

        const App = () => {
            const [wc, setWc] = useState(null);
            const [isBooting, setIsBooting] = useState(true);
            const [serverReady, setServerReady] = useState(false);
            const [files, setFiles] = useState(INITIAL_FILES);
            const [activeFile, setActiveFile] = useState('index.js');
            const [previewUrl, setPreviewUrl] = useState('');
            
            const terminalRef = useRef(null);
            const writeTimer = useRef(null);

            useEffect(() => {
                if (!window.crossOriginIsolated) return;
                let mounted = true;

                async function bootOS() {
                    try {
                        if (!window.__wcPromise) {
                            window.__wcPromise = WebContainer.boot();
                        }
                        const container = await window.__wcPromise;
                        if (!mounted) return;

                        setWc(container);
                        await container.mount(files);
                        
                        container.on('server-ready', (port, url) => {
                            setPreviewUrl(url);
                            setServerReady(true);
                        });

                        setIsBooting(false);
                        startShell(container);
                    } catch (error) {
                        console.error("OS Boot Error:", error);
                    }
                }
                bootOS();

                return () => { mounted = false; };
            }, []);

            const startShell = async (container) => {
                if (!terminalRef.current || window.__shellStarted) return;
                window.__shellStarted = true;

                const term = new Terminal({
                    convertEol: true, 
                    theme: { background: '#0d1117', foreground: '#c9d1d9' },
                    fontFamily: '"Fira Code", Consolas, monospace', 
                    fontSize: 13
                });
                
                const fitAddon = new FitAddon();
                term.loadAddon(fitAddon);
                term.open(terminalRef.current);
                
                // Bulletproof resize observer for flexbox UI
                const resizeObserver = new ResizeObserver(() => fitAddon.fit());
                resizeObserver.observe(terminalRef.current);
                setTimeout(() => fitAddon.fit(), 100);

                term.writeln('\x1b[1;34m[SYSTEM]\x1b[0m \x1b[1mWebAssembly Engine Initialized.\x1b[0m');

                const shellProcess = await container.spawn('jsh', {
                    terminal: { cols: term.cols, rows: term.rows }
                });

                shellProcess.output.pipeTo(new WritableStream({ write(data) { term.write(data); } }));
                const input = shellProcess.input.getWriter();
                term.onData((data) => input.write(data));

                await input.write('npm install && npm start\r');
            };

            const handleEditorChange = (value) => {
                if (value === undefined) return;
                
                setFiles(prev => ({ ...prev, [activeFile]: { file: { contents: value } } }));

                if (wc) {
                    clearTimeout(writeTimer.current);
                    writeTimer.current = setTimeout(async () => {
                        try { await wc.fs.writeFile(`/${activeFile}`, value); } 
                        catch(err) { console.error(err); }
                    }, 400); 
                }
            };

            if (!window.crossOriginIsolated) {
                return (
                    <div className="h-full w-full flex flex-col items-center justify-center bg-[#0d1117] text-white">
                        <Loader2 className="w-12 h-12 animate-spin text-blue-500 mb-6" />
                        <h2 className="text-3xl font-bold tracking-tight">Initializing Environment</h2>
                        <p className="text-gray-400 mt-2">Bypassing CDN blocks and booting sandbox...</p>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-full w-full">
                    {/* Top VS Code Style Navbar */}
                    <div className="h-10 flex-shrink-0 bg-[#161b22] border-b border-[#30363d] flex items-center px-4 justify-between select-none">
                        <div className="flex items-center">
                            <Cpu className="w-4 h-4 text-blue-400 mr-2" />
                            <span className="font-semibold text-gray-200 text-sm tracking-wide">Serverless IDE</span>
                        </div>
                        <div className="text-[11px] font-medium text-gray-400 uppercase tracking-wider">
                            {isBooting ? <span className="text-yellow-500">Booting Core...</span> 
                            : serverReady ? <span className="text-green-500 flex items-center"><div className="w-2 h-2 bg-green-500 rounded-full animate-pulse mr-2"></div>Live on Port 3111</span> 
                            : <span className="text-blue-400">Starting Server...</span>}
                        </div>
                    </div>

                    <div className="flex-1 flex min-h-0 overflow-hidden">
                        {/* Sidebar */}
                        <div className="w-56 flex-shrink-0 bg-[#0d1117] border-r border-[#30363d] flex flex-col py-3">
                            <span className="text-[10px] font-bold text-gray-500 uppercase px-4 mb-2 tracking-widest">Explorer</span>
                            {Object.keys(files).map(name => (
                                <button key={name} onClick={() => setActiveFile(name)}
                                    className={`flex items-center w-full px-4 py-1.5 text-sm transition-colors border-l-2 ${
                                        activeFile === name 
                                        ? 'border-blue-500 bg-[#161b22] text-gray-100' 
                                        : 'border-transparent text-gray-400 hover:bg-[#161b22] hover:text-gray-200'
                                    }`}>
                                    {name.endsWith('.js') ? <FileCode2 className="w-4 h-4 mr-2 text-yellow-400"/> : <FileJson className="w-4 h-4 mr-2 text-green-400"/>}
                                    {name}
                                </button>
                            ))}
                        </div>

                        {/* Monaco Editor Area */}
                        <div className="flex-1 flex flex-col min-w-0 bg-[#0d1117]">
                            <div className="h-9 flex-shrink-0 bg-[#161b22] flex items-end px-2 border-b border-[#30363d]">
                                <div className="flex items-center px-4 py-2 bg-[#0d1117] border-t-2 border-blue-500 text-gray-200 text-xs rounded-t-sm shadow-lg">
                                    {activeFile.endsWith('.js') ? <FileCode2 className="w-3.5 h-3.5 mr-2 text-yellow-400"/> : <FileJson className="w-3.5 h-3.5 mr-2 text-green-400"/>}
                                    {activeFile}
                                </div>
                            </div>
                            
                            <div className="flex-1 relative">
                                {/* Absolute inset-0 guarantees Monaco fits strictly inside the flexbox layout */}
                                <div className="absolute inset-0">
                                    <Editor 
                                        theme="vs-dark"
                                        language={activeFile.endsWith('.js') ? 'javascript' : 'json'}
                                        value={files[activeFile].file.contents}
                                        onChange={handleEditorChange}
                                        options={{ minimap: { enabled: false }, fontSize: 14, fontFamily: 'Menlo, Monaco, Consolas, monospace', padding: { top: 16 } }}
                                    />
                                </div>
                            </div>
                        </div>

                        {/* Right Panel: Browser + Terminal */}
                        <div className="w-[450px] flex-shrink-0 bg-[#0d1117] flex flex-col border-l border-[#30363d] shadow-2xl">
                            
                            {/* Browser Header */}
                            <div className="h-10 flex-shrink-0 bg-[#161b22] border-b border-[#30363d] flex items-center px-3 space-x-2">
                                <div className="flex space-x-1.5 mr-2">
                                    <div className="w-2.5 h-2.5 rounded-full bg-red-500/80"></div>
                                    <div className="w-2.5 h-2.5 rounded-full bg-yellow-500/80"></div>
                                    <div className="w-2.5 h-2.5 rounded-full bg-green-500/80"></div>
                                </div>
                                <button onClick={() => {
                                    const iframe = document.getElementById('preview');
                                    if (iframe) iframe.src = iframe.src;
                                }} className="p-1.5 text-gray-400 hover:bg-[#30363d] hover:text-white rounded transition-colors">
                                    <RotateCcw className="w-3.5 h-3.5" />
                                </button>
                                <div className="flex-1 bg-[#0d1117] border border-[#30363d] rounded px-3 py-1.5 text-[11px] text-gray-300 font-mono truncate flex items-center">
                                    <Globe className="w-3 h-3 mr-2 text-gray-500"/> 
                                    {previewUrl || 'Waiting for localhost...'}
                                </div>
                            </div>
                            
                            {/* Iframe Preview */}
                            <div className="flex-1 relative bg-white">
                                {!previewUrl ? (
                                    <div className="absolute inset-0 flex flex-col items-center justify-center text-gray-400 bg-[#0d1117]">
                                        <Loader2 className="w-8 h-8 animate-spin mb-4 text-blue-500" /> 
                                        <p className="text-sm">Awaiting Server Start...</p>
                                    </div>
                                ) : (
                                    <iframe id="preview" src={previewUrl} className="absolute inset-0 w-full h-full border-none bg-white" allow="cross-origin-isolated" />
                                )}
                            </div>

                            {/* Embedded Terminal */}
                            <div className="h-[280px] flex-shrink-0 flex flex-col bg-[#0d1117] border-t border-[#30363d]">
                                <div className="h-8 flex-shrink-0 bg-[#161b22] flex items-center px-4 text-[10px] font-bold uppercase tracking-widest text-gray-500 border-b border-[#30363d]">
                                    <TerminalIcon className="w-3 h-3 mr-2" /> Output
                                </div>
                                <div className="flex-1 relative p-1">
                                    <div className="absolute inset-0 p-1 overflow-hidden" ref={terminalRef}></div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
